<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cinéma">
<link rel="apple-touch-icon" href="/icon-192.svg">
<link rel="manifest" href="/manifest.json">
<title>🎥 Au cinéma</title>
<style>
:root {
  --navy:   #0d2137;
  --blue2:  #1a3550;
  --blue3:  #2a4f70;
  --gold:   #f0c040;
  --text:   #d0e0f0;
  --muted:  #7090a0;
  --green:  #4caf7d;
  --orange: #e08030;
  --st: env(safe-area-inset-top, 0px);
  --sb: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  background: var(--navy); color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
  padding-top: calc(56px + var(--st));
  padding-bottom: calc(60px + var(--sb));
  min-height: 100dvh;
}

/* ── Tab bar navigation ── */
.tab-bar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
  height: calc(56px + var(--sb)); padding-bottom: var(--sb);
  background: rgba(13,33,55,.97); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border-top: 1px solid var(--blue3);
  display: flex; align-items: stretch;
}
.tab-item {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 3px; text-decoration: none; color: var(--muted); transition: color .15s;
}
.tab-item:active { opacity: .7; }
.tab-item.active { color: var(--gold); }
.tab-icon { font-size: 22px; line-height: 1; }
.tab-label { font-size: 10px; font-weight: 600; letter-spacing: .2px; }

/* ── Barre auto-scrape ── */
#auto-scrape-bar { position: fixed; top: 0; left: 0; right: 0; z-index: 999; height: 3px; pointer-events: none; }
#auto-scrape-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--gold), #ffe080); transition: width 2s ease; border-radius: 0 2px 2px 0; box-shadow: 0 0 8px rgba(240,192,64,.7); }

/* ── Header ── */
.header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  height: calc(56px + var(--st)); padding-top: var(--st);
  background: rgba(13,33,55,.97); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--blue3);
  display: flex; align-items: center;
  padding-left: 16px; padding-right: 12px; gap: 10px;
}
.header-title { font-size: 17px; font-weight: 700; color: var(--gold); flex: 1; }
.note-label { font-size: 11px; color: var(--muted); white-space: nowrap; }
#scrape-indicator {
  display: none; align-items: center; gap: 4px;
  font-size: 10px; color: var(--gold);
  background: rgba(240,192,64,.08); border: 1px solid rgba(240,192,64,.25);
  border-radius: 8px; padding: 2px 7px; white-space: nowrap; flex-shrink: 0;
}
#scrape-indicator.show { display: flex; }
#scrape-indicator .si-dot {
  width: 5px; height: 5px; border-radius: 50%; background: var(--gold);
  animation: si-pulse .9s ease-in-out infinite alternate;
}
@keyframes si-pulse { from { opacity: .3; } to { opacity: 1; } }

/* ── Progress bar ── */
.prog-zone { padding: 8px 14px 4px; display: none; }
.prog-zone.show { display: block; }
.prog-lbl { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
.prog-track { background: var(--blue2); border-radius: 3px; height: 5px; overflow: hidden; }
.prog-fill { height: 100%; border-radius: 3px; width: 0%; transition: width .3s; background: var(--gold); }

/* ── Filter bar ── */
.filter-bar {
  display: none; padding: 8px 12px;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  scrollbar-width: none; gap: 6px;
  border-bottom: 1px solid var(--blue2);
  align-items: center;
}
.filter-bar.show { display: flex; }
.filter-bar::-webkit-scrollbar { display: none; }
.filter-bar select {
  background: var(--blue2); border: 1px solid var(--blue3); color: var(--text);
  padding: 6px 10px; border-radius: 20px; font-size: 13px;
  flex-shrink: 0; -webkit-appearance: none; cursor: pointer;
}
.filter-toggle { flex-shrink: 0; cursor: pointer; }
.filter-toggle input { display: none; }
.filter-toggle span {
  display: inline-block; padding: 6px 10px; border-radius: 20px; font-size: 12px;
  background: var(--blue2); border: 1px solid var(--blue3); color: var(--muted);
  white-space: nowrap; transition: all .15s;
}
.filter-toggle input:checked + span { border-color: var(--gold); color: var(--gold); background: rgba(240,192,64,.08); }

/* Filtres desktop uniquement */
.desktop-only { display: none !important; }

/* ── Stats + export bar ── */
.stats { padding: 6px 14px; font-size: 11px; color: var(--muted); display: none; }
.stats.show { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

/* ── Cards ── */
.cards { padding: 6px 10px; display: flex; flex-direction: column; gap: 6px; }

.card {
  background: var(--blue2); border: 1px solid var(--blue3);
  border-radius: 12px; padding: 10px 12px; cursor: pointer;
  transition: border-color .12s;
}
.card:active { border-color: var(--gold); }

.card-top { display: flex; align-items: flex-start; gap: 10px; }
.card-poster { width: 56px; flex-shrink: 0; border-radius: 6px; overflow: hidden; background: var(--blue3); aspect-ratio: 2/3; }
.card-poster img { width: 100%; height: 100%; object-fit: cover; display: block; }
.card-poster-ph { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 20px; background: var(--navy); }
.card-info { flex: 1; min-width: 0; }
.card-title { font-size: 14px; font-weight: 600; color: #fff; line-height: 1.25; }
.card-meta  { font-size: 11px; color: var(--muted); margin-top: 2px; }
.card-crew  { font-size: 11px; color: var(--muted); margin-top: 2px; }
.card-crew strong { color: var(--text); font-weight: 600; }
.card-actors { font-size: 10px; color: var(--muted); margin-top: 1px; font-style: italic; }
.decade-pill {
  display: inline-block; font-size: 9px; font-weight: 700;
  background: rgba(240,192,64,.12); color: var(--gold);
  border: 1px solid rgba(240,192,64,.25); border-radius: 4px;
  padding: 1px 4px; margin-left: 4px; vertical-align: middle;
}
.seances-badge { font-size: 11px; color: var(--gold); font-weight: 600; margin-top: 4px; }

.card-scores { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.score-block { text-align: center; }
.score-val { font-size: 17px; font-weight: 700; line-height: 1; }
.score-val.green  { color: var(--green); }
.score-val.orange { color: var(--orange); }
.score-val.muted  { color: var(--muted); font-size: 14px; }
.score-lbl { font-size: 8px; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; }
.score-sep { width: 1px; height: 18px; background: var(--blue3); }

/* Synopsis */
.card-synopsis-wrap {
  margin-top: 7px; padding-top: 7px;
  border-top: 1px solid rgba(42,79,112,.5);
  font-size: 12px; color: var(--text); line-height: 1.5;
}
.card-synopsis-preview { color: var(--text); }
.card-synopsis-rest { display: none; }
.card-synopsis-rest.show { display: inline; }
.card-more-btn { color: var(--gold); font-size: 11px; cursor: pointer; margin-left: 3px; white-space: nowrap; }

/* Boutons actions utilisateur */
.card-ua { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; padding-top: 7px; border-top: 1px solid rgba(42,79,112,.5); }
.ua-btn {
  flex: 1; background: none; border: 1px solid var(--blue3); color: var(--muted);
  border-radius: 8px; padding: 5px 4px; font-size: 11px; cursor: pointer;
  text-align: center; transition: all .15s;
}
.ua-btn.active-vu   { border-color: #4caf7d; color: #4caf7d; background: rgba(76,175,125,.12); }
.ua-btn.active-voir { border-color: #3498db; color: #3498db; background: rgba(52,152,219,.12); }
.ua-btn.active-nope { border-color: #e74c3c; color: #e74c3c; background: rgba(231,76,60,.12); }
.ua-note-ac { flex-basis: 100%; text-align: center; font-size: 11px; color: var(--gold, #f0c040); letter-spacing: 1px; margin-top: 2px; }
.ua-note-ac .ua-note-val { font-size: 10px; opacity: .75; margin-left: 3px; }

/* Empty */
.empty { text-align: center; padding: 60px 20px; color: var(--muted); display: none; }
.empty.show { display: block; }

/* ── Modales ── */
#info-modal {
  display: none; position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,.7); align-items: flex-end; justify-content: center;
  padding-bottom: var(--sb);
}
#info-modal.open { display: flex; }
.info-sheet {
  background: #0f2540; border-radius: 18px 18px 0 0;
  padding: 20px 20px calc(20px + var(--sb)); width: 100%;
  max-height: 70vh; overflow-y: auto;
}
.info-sheet h3 { color: var(--gold); font-size: 15px; margin-bottom: 16px; }
.info-row { display: flex; justify-content: space-between; padding: 9px 0;
  border-bottom: 1px solid rgba(42,79,112,.4); gap: 12px; }
.info-row:last-of-type { border-bottom: none; }
.info-row .lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
.info-row .val { font-size: 12px; color: var(--text); text-align: right; }
.info-errors { margin-top: 10px; font-size: 11px; color: #e74c3c; line-height: 1.6; }
.info-progress { margin-top: 6px; }
.info-progress-bar-wrap { height: 4px; background: rgba(42,79,112,.5); border-radius: 2px; overflow: hidden; margin-top: 3px; }
.info-progress-bar { height: 100%; background: var(--gold); border-radius: 2px; transition: width .4s ease; }
.info-progress-label { font-size: 10px; color: var(--gold); display: flex; justify-content: space-between; }
.info-scraping-badge { display: inline-block; font-size: 10px; color: var(--gold); background: rgba(240,192,64,.1); border: 1px solid rgba(240,192,64,.3); border-radius: 4px; padding: 1px 5px; margin-left: 6px; vertical-align: middle; animation: pulse-badge .8s ease-in-out infinite alternate; }
@keyframes pulse-badge { from { opacity: .6; } to { opacity: 1; } }
.info-section-title { font-size: 10px; font-weight: 700; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; margin-top: 14px; margin-bottom: 2px; padding-bottom: 4px; border-bottom: 1px solid rgba(240,192,64,.2); }
.info-section-title:first-child { margin-top: 0; }
.info-close-btn {
  width: 100%; margin-top: 16px; padding: 12px; border-radius: 10px;
  background: var(--blue3); border: none; color: var(--text);
  font-size: 14px; font-weight: 600; cursor: pointer;
}

/* Error banner */
#error-banner { margin: 8px 12px; padding: 10px 14px; background: rgba(180,50,50,.25);
  border: 1px solid rgba(200,80,80,.4); border-radius: 10px; font-size: 13px;
  color: #f08080; display: none; }

/* ── Menu hamburger ── */
.menu-btn {
  background: none; border: 1px solid var(--blue3); color: var(--muted);
  border-radius: 8px; width: 32px; height: 32px; font-size: 16px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: color .15s, border-color .15s;
}
.menu-btn:active, .menu-btn.open { color: var(--gold); border-color: var(--gold); }
.menu-dropdown {
  display: none; position: fixed;
  top: calc(56px + var(--st) + 6px); right: 12px;
  background: #0f2540; border: 1px solid var(--blue3);
  border-radius: 12px; z-index: 400; min-width: 200px;
  box-shadow: 0 8px 24px rgba(0,0,0,.5); overflow: hidden;
}
.menu-dropdown.open { display: block; }
.menu-item {
  display: flex; align-items: center; gap: 10px;
  width: 100%; padding: 14px 16px;
  background: none; border: none; border-bottom: 1px solid rgba(42,79,112,.3);
  color: var(--text); font-size: 14px; cursor: pointer; text-align: left;
}
.menu-item:last-child { border-bottom: none; }
.menu-item:active { background: rgba(255,255,255,.06); }
.menu-item:disabled { opacity: .4; cursor: default; }
.menu-separator { height: 1px; background: rgba(42,79,112,.5); }

/* ── Sous-menu Debug ── */
.menu-item-sub {
  display: flex; align-items: center; justify-content: space-between;
  width: 100%; padding: 14px 16px;
  background: none; border: none; border-bottom: 1px solid rgba(42,79,112,.3);
  color: var(--muted); font-size: 13px; cursor: pointer; text-align: left;
}
.menu-item-sub:active { background: rgba(255,255,255,.06); }
.menu-item-sub .sub-arrow { font-size: 10px; transition: transform .2s; }
.menu-item-sub.open .sub-arrow { transform: rotate(90deg); }
.submenu {
  display: none; background: rgba(0,0,0,.2);
  border-bottom: 1px solid rgba(42,79,112,.3);
}
.submenu.open { display: block; }
.submenu .menu-item {
  padding-left: 28px; font-size: 13px; color: var(--muted);
  border-bottom: 1px solid rgba(42,79,112,.15);
}
.submenu .menu-item:last-child { border-bottom: none; }

/* ── Profils & Prefs modales ── */
#prefs-modal, #profiles-modal {
  display: none; position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,.7); align-items: flex-end; justify-content: center;
}
#prefs-modal.open, #profiles-modal.open { display: flex; }
.prefs-sheet {
  background: #0f2540; border-radius: 18px 18px 0 0;
  padding: 20px 20px calc(20px + var(--sb)); width: 100%;
  max-height: 75vh; overflow-y: auto;
}
.prefs-sheet h3 { color: var(--gold); font-size: 15px; margin-bottom: 16px; }
.prefs-section { margin-bottom: 20px; }
.prefs-section-title { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
.pref-row { display: flex; justify-content: space-between; align-items: center; padding: 13px 0; border-bottom: 1px solid rgba(42,79,112,.3); }
.pref-row:last-child { border-bottom: none; }
.pref-label { font-size: 14px; color: var(--text); }
.pref-sub   { font-size: 11px; color: var(--muted); margin-top: 2px; }
/* Toggle switch */
.toggle { position: relative; width: 44px; height: 26px; flex-shrink: 0; }
.toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
.toggle-slider { position: absolute; inset: 0; cursor: pointer; background: var(--blue3); border-radius: 13px; transition: background .2s; }
.toggle-slider::before { content: ''; position: absolute; width: 20px; height: 20px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: transform .2s; }
.toggle input:checked + .toggle-slider { background: var(--gold); }
.toggle input:checked + .toggle-slider::before { transform: translateX(18px); }

/* ── Profils ── */
.profile-row { display: flex; justify-content: space-between; align-items: center; padding: 13px 0; border-bottom: 1px solid rgba(42,79,112,.3); cursor: pointer; }
.profile-row:last-child { border-bottom: none; }
.profile-row.active { cursor: default; }
.profile-name { font-size: 14px; color: var(--text); }
.profile-badge-active { font-size: 11px; color: var(--gold); }
.profile-badge-switch { font-size: 11px; color: var(--muted); }
.profile-delete-btn { background: none; border: none; cursor: pointer; font-size: 14px; opacity: .5; padding: 2px 4px; border-radius: 4px; transition: opacity .15s; }
.profile-delete-btn:hover { opacity: 1; }
.add-user-row { display: flex; gap: 8px; align-items: center; margin-top: 16px; }
.add-user-input { flex: 1; background: var(--blue2); border: 1px solid var(--blue3); color: var(--text); border-radius: 8px; padding: 10px 12px; font-size: 16px; }
.add-user-btn { background: var(--gold); color: #000; border: none; border-radius: 8px; padding: 10px 14px; font-size: 14px; font-weight: 700; cursor: pointer; white-space: nowrap; }

/* Profile badge header */
#profile-header-badge {
  display: none; align-items: center; gap: 4px;
  background: rgba(240,192,64,.1); border: 1px solid rgba(240,192,64,.25);
  border-radius: 14px; padding: 4px 10px; font-size: 12px; color: var(--gold);
  cursor: pointer; white-space: nowrap; flex-shrink: 0;
}

/* ── RESPONSIVE DESKTOP ─────────────────────────────────────── */
@media (min-width: 700px) {
  body { padding-top: calc(60px + var(--st)); }
  .header { height: calc(60px + var(--st)); padding-left: 24px; padding-right: 20px; }
  .header-title { font-size: 18px; }

  .cards {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    padding: 10px 20px;
    gap: 10px;
  }

  .desktop-only { display: flex !important; }

  .filter-bar {
    overflow-x: visible;
    flex-wrap: wrap;
    padding: 10px 20px;
    gap: 8px;
  }
  .stats { padding: 8px 20px; }
  #error-banner { margin: 8px 20px; }

  #info-modal, #prefs-modal, #profiles-modal {
    align-items: center;
    padding-bottom: 0;
  }
  .info-sheet {
    border-radius: 14px;
    max-width: 480px;
    padding-bottom: 24px;
  }
  .prefs-sheet {
    border-radius: 14px;
    max-width: 480px;
    padding-bottom: 24px;
  }
  .prog-zone { padding: 8px 20px 4px; }
}

@media (min-width: 1100px) {
  .cards { grid-template-columns: repeat(3, 1fr); padding: 12px 28px; }
  .filter-bar { padding: 10px 28px; }
  .stats { padding: 8px 28px; }
  #error-banner { margin: 8px 28px; }
  .prog-zone { padding: 8px 28px 4px; }
}
</style>
</head>
<body>

<div id="auto-scrape-bar"><div id="auto-scrape-fill"></div></div>

<div id="info-modal" onclick="if(event.target===this)closeInfo()">
  <div class="info-sheet">
    <h3>ℹ Informations</h3>
    <div id="info-content">Chargement…</div>
    <button class="info-close-btn" onclick="closeInfo()">Fermer</button>
  </div>
</div>

<div class="header">
  <div style="display:flex;align-items:center;gap:8px;flex:1;min-width:0;overflow:hidden;">
    <div class="header-title">🎥 Au cinéma</div>
  </div>
  <div id="scrape-indicator"><span class="si-dot"></span><span id="scrape-indicator-label"></span></div>
  <div id="server-status" style="display:none;"></div>
  <div id="profile-header-badge" onclick="openProfiles()">
    👤 <span id="profile-name-badge">—</span>
  </div>
  <button class="menu-btn" id="menu-btn" onclick="toggleMenu(event)">☰</button>
</div>

<div class="menu-dropdown" id="menu-dropdown">
  <button class="menu-item" onclick="closeMenu();openPrefs()">🔖 Préférences</button>
  <button class="menu-item" onclick="closeMenu();openInfo()">ℹ Info</button>
  <button class="menu-item" onclick="closeMenu();openMyProfile()">⚙️ Mon profil</button>
  <button class="menu-item" id="btn-user-mgmt" style="display:none" onclick="closeMenu();openUserManagement()">👥 Gestion des utilisateurs</button>
  <div class="menu-separator" id="debug-separator"></div>
  <button class="menu-item-sub" id="btn-debug-toggle" onclick="toggleSubmenu(event)">
    🛠 Debug <span class="sub-arrow">▶</span>
  </button>
  <div class="submenu" id="submenu-debug">
    <button class="menu-item" id="btn-run" onclick="closeMenu();startScrape()" disabled>▶ Scraper</button>
    <button class="menu-item" onclick="closeMenu();clearCinemaCache()">🗑️ Vider cache</button>
  </div>
</div>

<div class="prog-zone" id="prog-zone">
  <div class="prog-lbl" id="prog-lbl">Connexion à AlloCiné…</div>
  <div class="prog-track"><div class="prog-fill" id="prog-fill"></div></div>
</div>

<div id="error-banner"></div>

<div class="filter-bar" id="filter-bar">
  <select id="fil-genre" onchange="applyFilters()">
    <option value="">Tous genres</option>
  </select>
  <select id="fil-note" onchange="applyFilters()">
    <option value="0">Toutes notes combinées</option>
    <option value="7.5">≥ 7,5</option>
    <option value="8">≥ 8,0</option>
    <option value="8.5">≥ 8,5</option>
  </select>
  <label class="filter-toggle"><input type="checkbox" id="fil-only-voir" onchange="applyFilters()"><span>🔖 À voir</span></label>
  <select id="fil-sort" onchange="applySort(this.value)">
    <option value="seances">↓ Séances</option>
    <option value="combinee" selected>↓ Note combinée</option>
    <option value="date">↓ Date de sortie</option>
  </select>
</div>

<div class="stats" id="stats">
  <span id="stats-text"></span>
</div>

<div class="cards" id="cards"></div>
<div class="empty" id="empty">Aucun film trouvé avec ces critères.</div>
<div id="first-launch" style="display:none;text-align:center;padding:60px 20px;">
  <div style="font-size:40px;margin-bottom:16px;">🎥</div>
  <div style="color:var(--text);font-size:15px;margin-bottom:8px;">Pas encore de données</div>
  <div style="color:var(--muted);font-size:13px;margin-bottom:24px;">Lancez le premier scraping pour afficher les films actuellement au cinéma.</div>
  <button id="btn-first-scrape" onclick="startScrape()" style="background:var(--gold);color:#0d2137;border:none;border-radius:10px;padding:12px 24px;font-size:15px;font-weight:700;cursor:pointer;opacity:.5;" disabled>▶ Scraper maintenant</button>
</div>

<div id="profiles-modal" onclick="if(event.target===this)closeProfiles()">
  <div class="prefs-sheet">
    <h3>👤 Profils</h3>
    <div id="profiles-content"><p style="color:var(--muted);font-size:13px;padding:10px 0">Chargement…</p></div>
    <button class="info-close-btn" style="margin-top:20px" onclick="closeProfiles()">Fermer</button>
  </div>
</div>

<div id="prefs-modal" onclick="if(event.target===this)closePrefs()">
  <div class="prefs-sheet">
    <h3>🔖 Mes préférences</h3>
    <div id="prefs-content"></div>
    <button class="info-close-btn" onclick="closePrefs()">Fermer</button>
  </div>
</div>

<script src="/shared.js"></script>
<script>
// ─── Cache localStorage cinéma ────────────────────────────────────────────────
const LS_FILMS_CI = 'vod_cinema_films';
const LS_DATE_CI  = 'vod_cinema_date';

// ─── Tri par défaut ───────────────────────────────────────────────────────────
let _cinemaSortOrder = 'combinee';

// ─── Objet UI ─────────────────────────────────────────────────────────────────
const UI = {
  renderFilms(films) { renderCards(films); },
  reapplyAfterSort(films) {
    films.forEach((film, i) => this.renderUserActions(film, i));
  },
  renderUserActions(film, idx) {
    const el = document.getElementById(`ua-${idx}`);
    if (!el) return;
    const id = film.allocineId;
    if (!id) { el.innerHTML = ''; return; }
    const ud = _userdata[id] || {};
    el.outerHTML = `<div class="card-ua" id="ua-${idx}" onclick="event.stopPropagation()">
      <button class="ua-btn ${ud.vu ? 'active-vu' : ''}" onclick="toggleUA('${id}',${idx},'vu')">👁 Vu</button>
      <button class="ua-btn ${ud.vouloir ? 'active-voir' : ''}" onclick="toggleUA('${id}',${idx},'vouloir')">🔖 À voir</button>
      <button class="ua-btn ${ud.nonInteresse ? 'active-nope' : ''}" onclick="toggleUA('${id}',${idx},'nonInteresse')">✕ Non</button>
      ${isJCProfile() && ud.noteAC ? renderNoteAC(ud.noteAC) : ''}
    </div>`;
  },
  updateSortButtons(sortBy) {
    const sel = document.getElementById('fil-sort');
    if (sel) sel.value = sortBy;
  },
  reapplyUserActions() {
    _allFilms.forEach((film, i) => this.renderUserActions(film, i));
  },
  applyFilters() { applyFiltersCI(); },
  populateGenreFilter() {
    const genres = new Set();
    _allFilms.forEach(f => (f.genre||'').split(',').map(g => g.trim()).filter(Boolean).forEach(g => genres.add(g)));
    const sel = document.getElementById('fil-genre');
    const cur = sel.value;
    sel.innerHTML = '<option value="">Tous genres</option>' +
      [...genres].sort().map(g => `<option value="${esc(g.toLowerCase())}"${cur === g.toLowerCase() ? ' selected' : ''}>${esc(g)}</option>`).join('');
    this.applyFilters();
  },
  onScrapeStart(btn) {
    btn.disabled = true; btn.textContent = '⏳ En cours…';
    document.getElementById('prog-zone').classList.add('show');
    document.getElementById('error-banner').style.display = 'none';
    document.getElementById('prog-fill').style.width = '0%';
    document.getElementById('prog-lbl').textContent = 'Scraping en arrière-plan…';
    document.getElementById('empty').classList.remove('show');
    document.getElementById('first-launch').style.display = 'none';
  },
  onScrapeProgress(pct, count) {
    document.getElementById('prog-fill').style.width = pct + '%';
    document.getElementById('prog-lbl').textContent = `⏳ ${pct}% — ${count} films retenus`;
  },
  onScrapeDone(btn, lastScrape) {
    document.getElementById('prog-fill').style.width = '100%';
    document.getElementById('prog-lbl').textContent = `✅ ${_allFilms.length} films récupérés`;
    document.getElementById('server-status').textContent = '🟢';
    btn.disabled = false; btn.textContent = '▶ Scraper';
    document.getElementById('filter-bar').classList.add('show');
    document.getElementById('stats').classList.add('show');
    document.getElementById('empty').classList.toggle('show', _allFilms.length === 0);
  },
  onScrapeError(btn) {
    btn.disabled = false; btn.textContent = '▶ Scraper';
    document.getElementById('prog-lbl').textContent = '❌ Connexion perdue';
    this.showError('❌ Connexion perdue. Le serveur tourne ?');
  },
  onCacheLoaded(label) {
    document.getElementById('server-status').textContent = '📦';
    document.getElementById('first-launch').style.display = 'none';
    this.populateGenreFilter();
    applySort();
    document.getElementById('filter-bar').classList.add('show');
    document.getElementById('stats').classList.add('show');
  },
  onFilmsFromServer(d) {
    document.getElementById('filter-bar').classList.add('show');
    document.getElementById('stats').classList.add('show');
    if (d.lastScrape) {
      const dt = new Date(d.lastScrape);
      const label = dt.toLocaleDateString('fr-FR') + ' ' + dt.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
      document.getElementById('server-status').textContent = `🟢 ${label}`;
      setTimeout(() => { document.getElementById('server-status').textContent = '🟢'; }, 4000);
    }
  },
  showError(msg) {
    const el = document.getElementById('error-banner');
    el.textContent = msg; el.style.display = 'block';
    setTimeout(() => { el.style.display = 'none'; }, 8000);
  },
  showAutoScrapeBar(pct) {
    document.getElementById('auto-scrape-fill').style.width = pct + '%';
    document.getElementById('server-status').textContent = `🔄 ${pct}%`;
  },
  hideAutoScrapeBar() {
    const fill = document.getElementById('auto-scrape-fill');
    fill.style.width = '100%';
    setTimeout(() => { fill.style.width = '0%'; }, 1000);
    document.getElementById('server-status').textContent = '🟢';
  },
  showUserPicker(users) {
    renderProfiles(users, true);
    document.getElementById('profiles-modal').classList.add('open');
  }
};

// ─── Rendu des cartes ─────────────────────────────────────────────────────────
function renderCards(films) {
  const container = document.getElementById('cards');
  container.innerHTML = films.map((f, i) => {
    const url = f.allocineId
      ? `https://www.allocine.fr/film/fichefilm_gen_cfilm=${f.allocineId}.html`
      : `https://www.allocine.fr/rechercher/?q=${encodeURIComponent(f.titre)}`;
    const pScore = f.notePresse;
    const sScore = f.noteSpect;
    const LIMIT = 120;
    const full = f.synopsis || '';
    const short = full.length > LIMIT ? full.slice(0, full.lastIndexOf(' ', LIMIT)) : full;
    const rest = full.length > LIMIT ? full.slice(short.length) : '';
    const posterHtml = f.poster
      ? `<div class="card-poster"><img src="${esc(f.poster)}" alt="" loading="lazy" onerror="posterError(this)"></div>`
      : `<div class="card-poster"><div class="card-poster-ph">🎬</div></div>`;
    const datePill = f.dateSortie ? `<span class="decade-pill">${esc(f.dateSortie)}</span>` : '';
    const seancesTxt = f.nbSeances ? f.nbSeances.toLocaleString('fr-FR') + ' séances' : '';
    return `
<div class="card" id="card-${i}" data-idx="${i}" onclick="openFilm('${url}')">
  <div class="card-top">
    ${posterHtml}
    <div class="card-info">
      <div class="card-title">${esc(f.titre)}${datePill}</div>
      <div class="card-meta">${esc((f.genre||'').split(',').map(g=>g.trim()).filter(Boolean).join(', ') || '—')}${f.duree ? ` <span style="opacity:.75">· ${esc(f.duree)}</span>` : ''}</div>
      ${f.realisateur ? `<div class="card-crew">De <strong>${esc(f.realisateur)}</strong></div>` : ''}
      ${f.acteurs ? `<div class="card-actors">${esc(f.acteurs.split(',').map(a=>a.trim()).filter(Boolean).slice(0,5).join(', '))}</div>` : ''}
      ${seancesTxt ? `<div class="seances-badge">${seancesTxt}</div>` : ''}
    </div>
    <div class="card-scores">
      <div class="score-block">
        <div class="score-val ${pScore >= 4 ? 'green' : 'orange'}">${pScore != null ? pScore.toFixed(1) : '—'}</div>
        <div class="score-lbl">Presse</div>
      </div>
      <div class="score-sep"></div>
      <div class="score-block">
        ${sScore != null ? `<div class="score-val ${sScore >= 3.5 ? 'green' : 'muted'}">${sScore.toFixed(1)}</div>` : `<div class="score-val muted">—</div>`}
        <div class="score-lbl">Spect.</div>
      </div>
    </div>
  </div>
  ${full ? `<div class="card-synopsis-wrap" onclick="event.stopPropagation()"><span class="card-synopsis-preview">${esc(short)}</span>${rest ? `<span class="card-synopsis-rest" id="syn-rest-${i}">${esc(rest)}</span><span class="card-more-btn" id="syn-btn-${i}" onclick="toggleSynopsis(${i})">… Lire la suite</span>` : ''}</div>` : ''}
  <div id="ua-${i}"></div>
</div>`;
  }).join('');
}

function openFilm(url) { window.open(url, '_blank'); }

function toggleSynopsis(i) {
  const btn = document.getElementById(`syn-btn-${i}`);
  const rest = document.getElementById(`syn-rest-${i}`);
  if (!btn || !rest) return;
  const isOpen = rest.classList.contains('show');
  rest.classList.toggle('show', !isOpen);
  btn.textContent = isOpen ? '… Lire la suite' : ' Réduire';
}

function posterError(el) { el.parentNode.innerHTML = '<div class="card-poster-ph">🎬</div>'; }

// ─── Filtres ──────────────────────────────────────────────────────────────────
function applyFiltersCI() {
  const genreFilter  = document.getElementById('fil-genre').value;
  const onlyVoir     = document.getElementById('fil-only-voir')?.checked;
  const noteMin      = parseFloat(document.getElementById('fil-note')?.value || '0');

  let visible = 0;
  _allFilms.forEach((film, i) => {
    const card = document.getElementById(`card-${i}`);
    if (!card) return;

    const genres = (film.genre||'').split(',').map(g => g.trim().toLowerCase());
    const ud = _userdata[film.allocineId] || {};
    const combinee = (film.notePresse ?? 0) + (film.noteSpect ?? 0);

    const matchGenre  = (!genreFilter || genres.some(g => g.includes(genreFilter)))
                     && (_prefs.showDocumentaires || !genres.some(g => g.includes('documentaire')))
                     && (_prefs.showAnimations    || !genres.some(g => g.includes('animation')));
    const matchNote   = combinee >= noteMin;
    const matchListe  = (!_prefs.hideVus           || !ud.vu)
                     && (!_prefs.hideNonInteresse  || !ud.nonInteresse)
                     && (!onlyVoir                 || !!ud.vouloir);

    const ok = matchGenre && matchNote && matchListe;
    card.style.display = ok ? '' : 'none';
    if (ok) visible++;
  });

  const statsText = document.getElementById('stats-text');
  if (statsText) statsText.textContent = `${visible} film${visible > 1 ? 's' : ''} affiché${visible > 1 ? 's' : ''} · ${_allFilms.length} au total`;
  document.getElementById('empty').classList.toggle('show', visible === 0 && _allFilms.length > 0);
}

// ─── Service Worker ───────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(e => console.warn('SW non enregistré :', e.message));
}

// ─── Ping serveur ─────────────────────────────────────────────────────────────
async function pingServer() {
  const statusEl = document.getElementById('server-status');
  const btnEl    = document.getElementById('btn-run');
  try {
    const r = await fetch('/api/cinema/health', { signal: AbortSignal.timeout(3000) });
    if (r.ok) {
      const d = await r.json();
      statusEl.style.color = 'var(--green)';
      statusEl.textContent = '🟢';
      if (btnEl) btnEl.disabled = false;
      const btnFirst = document.getElementById('btn-first-scrape');
      if (btnFirst) { btnFirst.disabled = false; btnFirst.style.opacity = '1'; }
      return d;
    } else { throw new Error('non-ok'); }
  } catch {
    statusEl.textContent = '🔴 Hors ligne';
    statusEl.style.color = 'var(--orange)';
    if (btnEl) btnEl.disabled = true;
    return null;
  }
}

function isCinemaCacheStale(health) {
  if (!health) return false;
  const cacheDate = localStorage.getItem(LS_DATE_CI);
  if (!cacheDate) return false;
  const cached = new Date(cacheDate).getTime();
  const srvList = health.lastScrape ? new Date(health.lastScrape).getTime() : 0;
  return srvList > cached;
}

// ─── Cache localStorage cinéma ────────────────────────────────────────────────
function saveCacheCI() {
  try {
    localStorage.setItem(LS_FILMS_CI, JSON.stringify(_allFilms));
    localStorage.setItem(LS_DATE_CI,  new Date().toISOString());
  } catch(e) { console.warn('[cinema cache] Erreur sauvegarde :', e.message); }
}

function loadCacheCI() {
  try {
    const films = localStorage.getItem(LS_FILMS_CI);
    const date  = localStorage.getItem(LS_DATE_CI);
    if (!films) return false;
    _allFilms = JSON.parse(films);
    const d = date ? new Date(date) : null;
    const label = d ? `${d.toLocaleDateString('fr-FR')} à ${d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}` : '—';
    UI.onCacheLoaded(label);
    return true;
  } catch(e) { console.warn('[cinema cache] Erreur chargement :', e.message); return false; }
}

// ─── Indicateur scraping header ───────────────────────────────────────────────
const _phaseLabel = {
  'films-list':       'Films · liste',
  'films-details':    'Films · plateformes',
  'series-list':      'Séries · liste',
  'series-details':   'Séries · détails',
  'bestever-list':    'Best ever · liste',
  'bestever-details': 'Best ever · plateformes',
  'cinema':           'Cinéma',
};
const _phaseKey = {
  'films-list':       'filmsList',
  'films-details':    'filmsDetails',
  'series-list':      'seriesList',
  'series-details':   'seriesDetails',
  'bestever-list':    'besteverList',
  'bestever-details': 'besteverDetails',
  'cinema':           'cinema',
};
function _updateScrapeIndicator(st) {
  const el  = document.getElementById('scrape-indicator');
  const lbl = document.getElementById('scrape-indicator-label');
  if (!el) return;
  if (st?.phase) {
    const pct = st[_phaseKey[st.phase]]?.pct ?? '';
    lbl.textContent = `${_phaseLabel[st.phase] || st.phase}${pct !== '' ? ' ' + pct + '%' : ''}`;
    el.classList.add('show');
  } else {
    el.classList.remove('show');
  }
}
(function startScrapePolling() {
  let interval = 10000;
  async function poll() {
    try {
      const r = await fetch('/api/scraping-status', { signal: AbortSignal.timeout(3000) });
      if (r.ok) {
        const st = await r.json();
        _updateScrapeIndicator(st);
        if (st?.phase && document.getElementById('info-modal')?.classList.contains('open')) {
          if (_infoData) { _infoData.status = st; renderInfo(); }
        }
        interval = st?.phase ? 3000 : 10000;
      }
    } catch(e) {}
    setTimeout(poll, interval);
  }
  setTimeout(poll, 5000);
})();

// ─── Menu ─────────────────────────────────────────────────────────────────────
function toggleMenu(e) {

  const dd = document.getElementById('menu-dropdown');
  const btn = document.getElementById('menu-btn');
  const isOpen = dd.classList.toggle('open');
  btn.classList.toggle('open', isOpen);
}
function closeMenu() {
  document.getElementById('menu-dropdown').classList.remove('open');
  document.getElementById('menu-btn').classList.remove('open');
  document.getElementById('submenu-debug')?.classList.remove('open');
  document.getElementById('btn-debug-toggle')?.classList.remove('open');
}
function toggleSubmenu(e) {
  e.stopPropagation();
  const sub = document.getElementById('submenu-debug');
  const btn = document.getElementById('btn-debug-toggle');
  sub.classList.toggle('open');
  btn.classList.toggle('open');

// ─── Profils ──────────────────────────────────────────────────────────────────
async function openProfiles() {
  document.getElementById('profiles-modal').classList.add('open');
  document.getElementById('profiles-content').innerHTML =
    '<p style="color:var(--muted);font-size:13px;padding:10px 0">Chargement…</p>';
  try {
    const list = await loadUsers();
    renderProfiles(list);
  } catch(e) {
    document.getElementById('profiles-content').innerHTML =
      '<p style="color:#e74c3c;font-size:13px;padding:10px 0">Erreur de chargement</p>';
  }
}
function closeProfiles() { document.getElementById('profiles-modal').classList.remove('open'); }

function renderProfiles(list, firstLaunch = false) {
  const isAdmin = _currentUserId === 'user_default';
  const intro = firstLaunch
    ? '<p style="font-size:13px;color:var(--text);margin-bottom:16px;line-height:1.5">C\'est ton premier lancement.<br>Choisis ton profil ou crée-en un nouveau.</p>'
    : '';
  const rows = list.map(u => {
    const isActive  = u.id === _currentUserId;
    const canDelete = isAdmin && u.id !== 'user_default';
    const deleteBtn = canDelete
      ? `<button class="profile-delete-btn" onclick="event.stopPropagation();deleteUser('${u.id}','${esc(u.name)}')" title="Supprimer">🗑️</button>`
      : '';
    const lockIcon = (!isActive && u.hasPin) ? ' 🔒' : '';
    return `<div class="profile-row ${isActive ? 'active' : ''}" ${isActive ? '' : `onclick="selectProfile('${u.id}',${!!u.hasPin})"`}>
      <span class="profile-name">${esc(u.name)}${lockIcon}</span>
      <div style="display:flex;align-items:center;gap:8px">
        ${isActive ? '<span class="profile-badge-active">● Actif</span>' : '<span class="profile-badge-switch">Sélectionner →</span>'}
        ${deleteBtn}
      </div>
    </div>`;
  }).join('');
  document.getElementById('profiles-content').innerHTML = `
    ${intro}
    <div class="prefs-section">
      <div class="prefs-section-title">Profils disponibles</div>
      ${rows || '<p style="color:var(--muted);font-size:13px;padding:10px 0">Aucun profil</p>'}
    </div>
    <div class="add-user-row">
      <input type="text" id="new-user-name" class="add-user-input"
        placeholder="Nouveau profil…" maxlength="30"
        onkeydown="if(event.key==='Enter')onAddUser()">
      <button class="add-user-btn" onclick="onAddUser()">+ Ajouter</button>
    </div>`;
}

async function deleteUser(userId, userName) {
  if (!confirm(`Supprimer le profil "${userName}" ?\n\nToutes ses notes et préférences seront définitivement perdues.`)) return;
  try {
    const r = await fetch(`/api/users/${userId}`, { method: 'DELETE' });
    if (!r.ok) { const d = await r.json(); UI.showError(`Erreur : ${d.error}`); return; }
    const list = await loadUsers();
    renderProfiles(list);
  } catch(e) { UI.showError('Erreur lors de la suppression.'); }
}

async function selectProfile(userId, hasPin = false) {
  if (hasPin) {
    const ok = await promptPinModal(userId);
    if (!ok) return;
  }
  switchUser(userId);
  loadPrefs();
  _userdata = {};
  await loadUserdata();
  closeProfiles();
  updateProfileBadge();
}

async function onAddUser() {
  const input = document.getElementById('new-user-name');
  const name = input ? input.value.trim() : '';
  if (!name) { input && input.focus(); return; }
  input.disabled = true;
  try {
    await createUser(name);
    _prefs = { showDocumentaires: false, showAnimations: false, hideVus: true, hideNonInteresse: true };
    savePrefs();
    _userdata = {};
    await loadUserdata();
    closeProfiles();
    updateProfileBadge();
    setTimeout(() => openMyProfile(true), 300);
  } catch(e) {
    input.disabled = false;
    input.focus();
  }
}

function updateProfileBadge() {
  if (!_currentUserId) return;
  loadUsers().then(list => {
    const u = list.find(u => u.id === _currentUserId);
    if (!u) return;
    const nameEl = document.getElementById('profile-name-badge');
    const badge  = document.getElementById('profile-header-badge');
    if (nameEl) nameEl.textContent = u.name;
    if (badge) badge.style.display = 'flex';
    updateDebugVisibility(u.name);
  }).catch(() => {});
}

// ─── Cache actions ────────────────────────────────────────────────────────────
async function clearCinemaCache() {
  if (!confirm('Vider le cache cinéma ? Les films disparaîtront jusqu\'au prochain scraping.')) return;
  try {
    const r = await fetch('/api/cinema/clear', { method: 'POST', headers: { 'x-app-secret': _appSecret } });
    const d = await r.json();
    UI.showError(`✅ Cache cinéma vidé — ${d.cleared} film(s) supprimés`);
    document.getElementById('cards').innerHTML = '';
    localStorage.removeItem(LS_FILMS_CI);
    localStorage.removeItem(LS_DATE_CI);
  } catch(e) { UI.showError('Erreur lors de la suppression du cache.'); }
}

// ─── Tri ──────────────────────────────────────────────────────────────────────
function applySort(critere) {
  if (critere) _cinemaSortOrder = critere;
  UI.updateSortButtons(_cinemaSortOrder);

  _allFilms.sort((a, b) => {
    if (_cinemaSortOrder === 'combinee') {
      const sa = (a.notePresse ?? 0) + (a.noteSpect ?? 0);
      const sb = (b.notePresse ?? 0) + (b.noteSpect ?? 0);
      return sb - sa || (b.notePresse ?? 0) - (a.notePresse ?? 0) || b.nbSeances - a.nbSeances;
    }
    if (_cinemaSortOrder === 'date') {
      // Parse dates FR pour comparer
      const da = parseDateCI(a.dateSortie);
      const db = parseDateCI(b.dateSortie);
      const ta = da ? da.getTime() : 0;
      const tb = db ? db.getTime() : 0;
      return tb - ta || b.nbSeances - a.nbSeances;
    }
    // 'seances' par défaut
    return b.nbSeances - a.nbSeances || ((b.notePresse ?? 0) + (b.noteSpect ?? 0)) - ((a.notePresse ?? 0) + (a.noteSpect ?? 0));
  });

  UI.renderFilms(_allFilms);
  UI.reapplyAfterSort(_allFilms);
  UI.applyFilters();
}

// Parse date FR côté client (même logique que serveur)
const _FR_MONTHS_CI = { janvier:0,février:1,mars:2,avril:3,mai:4,juin:5,juillet:6,août:7,septembre:8,octobre:9,novembre:10,décembre:11 };
function parseDateCI(str) {
  if (!str) return null;
  const m = str.toLowerCase().match(/(\d+)\s+(\w+)\s+(\d{4})/);
  if (!m) return null;
  const month = _FR_MONTHS_CI[m[2]];
  if (month === undefined) return null;
  return new Date(parseInt(m[3]), month, parseInt(m[1]));
}

// ─── Scraping manuel (SSE) ────────────────────────────────────────────────────
function startScrape() {
  const btn = document.getElementById('btn-run');
  UI.onScrapeStart(btn);
  let totalFound = 0;
  const es = new EventSource(`/api/cinema/scrape?secret=${encodeURIComponent(_appSecret || '')}`);
  es.onmessage = e => {
    const d = JSON.parse(e.data);
    if (d.type === 'progress') {
      const pct = Math.round(d.page / d.total * 100);
      totalFound += (d.found || 0);
      UI.onScrapeProgress(pct, totalFound);
    }
    if (d.type === 'error') UI.showError(`⚠ Erreur page ${d.page} : ${d.message}`);
    if (d.type === 'done') {
      es.close();
      // Recharge depuis serveur pour avoir la liste finale
      loadCinemaFromServer().then(() => {
        UI.onScrapeDone(btn, d.lastScrape);
      });
    }
  };
  es.onerror = () => {
    es.close();
    UI.onScrapeError(btn);
  };
}

// ─── Monitoring auto-scrape ───────────────────────────────────────────────────
async function startAutoScrapeMonitoring() {
  try {
    const r = await fetch('/api/cinema/scrape-status');
    const d = await r.json();
    if (d.isScraping) {
      UI.showAutoScrapeBar(d.pct);
      _startPollLoop();
    }
  } catch(e) {}
}

function _startPollLoop() {
  if (_pollTimer) return;
  _pollTimer = setInterval(async () => {
    try {
      const r = await fetch('/api/cinema/scrape-status');
      const d = await r.json();
      if (d.isScraping) {
        UI.showAutoScrapeBar(d.pct);
      } else {
        UI.hideAutoScrapeBar();
        clearInterval(_pollTimer);
        _pollTimer = null;
        await loadCinemaFromServer();
      }
    } catch(e) {}
  }, 5000);
}

async function loadCinemaFromServer() {
  try {
    const r = await fetch('/api/cinema', { signal: AbortSignal.timeout(10000) });
    if (!r.ok) return false;
    const d = await r.json();
    if (!d.films || d.films.length === 0) {
      document.getElementById('first-launch').style.display = 'block';
      return false;
    }
    _allFilms = d.films;
    saveCacheCI();
    UI.populateGenreFilter();
    applySort();
    UI.applyFilters();
    UI.onFilmsFromServer(d);
    _scrapingDone = true;
    return true;
  } catch(e) {
    console.warn('[server] Impossible de charger les films cinéma:', e.message);
    return false;
  }
}

// Override saveCache pour cette page
window.saveCache = saveCacheCI;

// ─── Init ─────────────────────────────────────────────────────────────────────
(async () => {
  await loadAppSecret();
  const userInit = await initUser();
  if (userInit.mode === 'pick') {
    UI.showUserPicker(userInit.users);
  } else {
    updateProfileBadge();
  }
  loadPrefs();
  const hadCache = loadCacheCI();
  const health   = await pingServer();
  if (!hadCache || isCinemaCacheStale(health)) {
    if (hadCache) {
      localStorage.removeItem(LS_FILMS_CI);
      localStorage.removeItem(LS_DATE_CI);
      console.log('[cinema cache] Données serveur plus récentes — rechargement');
    }
    await loadCinemaFromServer();
  }
  if (_currentUserId) await loadUserdata();
  startAutoScrapeMonitoring();
})();
</script>
