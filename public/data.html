<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>🗄️ Données — AlloCiné VOD v2</title>
<style>
:root {
  --navy:  #0d2137;
  --blue2: #1a3550;
  --blue3: #2a4f70;
  --gold:  #f0c040;
  --text:  #d0e0f0;
  --muted: #7090a0;
  --green: #4caf7d;
  --orange:#e08030;
  --red:   #e05050;
  --card:  #132030;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  background: var(--navy); color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
  font-size: 13px; min-height: 100vh; padding-bottom: 70px;
}

/* ── Header ── */
.hdr {
  background: var(--blue2); border-bottom: 1px solid var(--blue3);
  padding: 12px 16px; display: flex; align-items: center; gap: 10px;
  position: sticky; top: 0; z-index: 10;
}
.hdr-title { font-size: 16px; font-weight: 700; color: var(--gold); flex: 1; }
.hdr-stats { font-size: 11px; color: var(--muted); white-space: nowrap; }

/* ── Tabs ── */
.tabs {
  display: flex; overflow-x: auto; scrollbar-width: none;
  background: var(--blue2); border-bottom: 1px solid var(--blue3);
  position: sticky; top: 45px; z-index: 9;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  padding: 9px 16px; font-size: 12px; font-weight: 600; white-space: nowrap;
  color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent;
  transition: color .15s; flex-shrink: 0;
}
.tab.active { color: var(--gold); border-bottom-color: var(--gold); }
.tab:active { opacity: .7; }

/* ── Toolbar ── */
.toolbar {
  padding: 8px 12px; display: flex; flex-direction: column; gap: 6px;
  position: sticky; top: 80px; z-index: 8; background: var(--navy);
  border-bottom: 1px solid var(--blue3);
}
.toolbar-row { display: flex; gap: 8px; align-items: center; }
.search-input {
  flex: 1; background: var(--blue2); border: 1px solid var(--blue3);
  color: var(--text); padding: 7px 12px; border-radius: 20px; font-size: 13px;
  outline: none; min-width: 0;
}
.search-input::placeholder { color: var(--muted); }
.search-input:focus { border-color: var(--gold); }
.col-select {
  background: var(--blue2); border: 1px solid var(--blue3); color: var(--text);
  padding: 6px 10px; border-radius: 20px; font-size: 12px; outline: none;
  cursor: pointer; flex-shrink: 0; max-width: 160px;
}
.col-select:focus { border-color: var(--gold); }
.btn-clear {
  background: none; border: 1px solid var(--blue3); color: var(--muted);
  padding: 6px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; white-space: nowrap;
}
.btn-clear:active { border-color: var(--gold); color: var(--gold); }
/* Sort bar */
.sort-bar {
  display: flex; gap: 6px; align-items: center; flex-wrap: wrap;
}
.sort-lbl { font-size: 11px; color: var(--muted); white-space: nowrap; }
.sort-pill {
  display: inline-flex; align-items: center; gap: 4px;
  background: var(--blue2); border: 1px solid var(--gold);
  color: var(--gold); padding: 3px 10px; border-radius: 20px;
  font-size: 11px; font-weight: 600; cursor: pointer; white-space: nowrap;
}
.sort-pill:active { opacity: .7; }
.sort-pill.none {
  border-color: var(--blue3); color: var(--muted); cursor: default;
}

/* ── Table ── */
.table-wrap { overflow-x: auto; }
table {
  width: 100%; border-collapse: collapse; min-width: 500px;
}
thead th {
  background: var(--blue2); color: var(--muted);
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .5px; padding: 8px 10px;
  border-bottom: 1px solid var(--blue3);
  cursor: pointer; user-select: none; white-space: nowrap;
  text-align: left; position: sticky; top: 123px; z-index: 7;
}
thead th:hover { color: var(--gold); }
thead th.sort-asc::after  { content: ' ▲'; color: var(--gold); }
thead th.sort-desc::after { content: ' ▼'; color: var(--gold); }
tbody tr {
  border-bottom: 1px solid rgba(42,79,112,.4);
  cursor: pointer; transition: background .1s;
}
tbody tr:hover { background: rgba(42,79,112,.3); }
tbody tr.selected { background: rgba(240,192,64,.08); }
td { padding: 7px 10px; font-size: 12px; vertical-align: top; }
td.num { text-align: right; font-variant-numeric: tabular-nums; }
td.green { color: var(--green); }
td.orange { color: var(--orange); }
td.muted { color: var(--muted); }
td .badge {
  display: inline-block; font-size: 10px; padding: 1px 5px;
  border-radius: 4px; background: rgba(42,79,112,.5); color: var(--muted);
  white-space: nowrap;
}
td .tag {
  display: inline-block; font-size: 10px; padding: 1px 5px;
  border-radius: 4px; background: rgba(240,192,64,.15); color: var(--gold);
  margin-right: 2px; white-space: nowrap;
}

/* ── Empty state ── */
.empty { padding: 40px; text-align: center; color: var(--muted); }

/* ── JSON detail panel ── */
#detail-panel {
  display: none; position: fixed; bottom: 70px; left: 0; right: 0;
  background: var(--card); border-top: 1px solid var(--blue3);
  max-height: 45vh; overflow-y: auto; z-index: 20; padding: 0;
}
#detail-panel.show { display: block; }
.detail-hdr {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 14px; border-bottom: 1px solid var(--blue3);
  position: sticky; top: 0; background: var(--card); z-index: 1;
}
.detail-title { font-size: 12px; font-weight: 700; color: var(--gold); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.detail-close {
  background: none; border: 1px solid var(--blue3); color: var(--muted);
  padding: 3px 10px; border-radius: 6px; font-size: 11px; cursor: pointer; flex-shrink: 0;
}
.detail-close:active { border-color: var(--gold); color: var(--gold); }
#detail-json {
  padding: 12px 14px; font-family: 'SF Mono', Menlo, monospace;
  font-size: 11px; line-height: 1.6; white-space: pre-wrap;
  word-break: break-all; color: var(--text);
}

/* ── Loading ── */
.loading { padding: 40px; text-align: center; color: var(--muted); }
.spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--blue3); border-top-color: var(--gold); border-radius: 50%; animation: spin .8s linear infinite; margin-right: 8px; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Auth denied ── */
#denied { display: none; padding: 60px 20px; text-align: center; }
#denied h2 { font-size: 24px; color: var(--red); margin-bottom: 12px; }
#denied p  { color: var(--muted); font-size: 14px; }

/* ── Footer ── */
.footer {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--blue2); border-top: 1px solid var(--blue3);
  padding: 12px 16px; display: flex; align-items: center; justify-content: space-between;
  z-index: 10;
}
.footer-info { font-size: 11px; color: var(--muted); }
.btn-fermer {
  background: var(--blue3); border: none; color: var(--text);
  padding: 8px 24px; border-radius: 8px; font-size: 13px;
  font-weight: 600; cursor: pointer;
}
.btn-fermer:active { opacity: .7; }
</style>
</head>
<body>

<div id="denied">
  <h2>🔒 Accès refusé</h2>
  <p>Cet écran est réservé au profil JC.</p>
</div>

<div id="app" style="display:none">
  <div class="hdr">
    <div class="hdr-title">🗄️ Données brutes V2</div>
    <div class="hdr-stats" id="stats-lbl"></div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('films')">🎬 Films récents</div>
    <div class="tab" onclick="switchTab('bestever')">🏆 Best Ever</div>
    <div class="tab" onclick="switchTab('cinema')">🎭 Cinéma</div>
    <div class="tab" onclick="switchTab('series')">📺 Séries</div>
  </div>

  <div class="toolbar">
    <div class="toolbar-row">
      <input class="search-input" id="search-input" type="search" placeholder="Rechercher…" oninput="onSearch(this.value)">
      <select class="col-select" id="col-select" onchange="renderTable()">
        <option value="">Toutes colonnes</option>
      </select>
      <button class="btn-clear" onclick="clearSearch()">✕</button>
    </div>
    <div class="sort-bar" id="sort-bar">
      <span class="sort-lbl">Tri :</span>
      <span class="sort-pill none" id="sort-pill">Aucun</span>
    </div>
  </div>

  <div id="loading" class="loading"><span class="spinner"></span>Chargement…</div>
  <div class="table-wrap" id="table-wrap" style="display:none">
    <table>
      <thead id="thead"></thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="empty" id="empty" style="display:none">Aucun résultat</div>
  </div>
</div>

<div id="detail-panel">
  <div class="detail-hdr">
    <div class="detail-title" id="detail-title"></div>
    <button class="detail-close" onclick="closeDetail()">✕ Fermer</button>
  </div>
  <pre id="detail-json"></pre>
</div>

<div class="footer">
  <div class="footer-info" id="footer-info"></div>
  <button class="btn-fermer" onclick="window.close()">Fermer</button>
</div>

<script>
// ── Auth ─────────────────────────────────────────────────────────────────────
const LS_USER_ID = 'vod_user_id';

async function checkAuth() {
  const userId = localStorage.getItem(LS_USER_ID);
  if (!userId) { showDenied(); return false; }
  try {
    const r = await fetch('/api/users');
    const data = await r.json();
    const list = Array.isArray(data) ? data : (data.users || []);
    const user = list.find(u => u.id === userId);
    if (!user || user.name.toUpperCase() !== 'JC') { showDenied(); return false; }
    return true;
  } catch(e) { showDenied(); return false; }
}
function showDenied() {
  document.getElementById('denied').style.display = 'block';
}

// ── Données ──────────────────────────────────────────────────────────────────
// V2 : toutes les données sont inline dans cachedFilms / cachedSeries
// Pas de table "détails" séparée — tout est sur chaque objet.
const _data = { films: [], bestever: [], cinema: [], series: [] };
let _currentTab = 'films';
let _sortCol = null;
let _sortDir = 1; // 1=asc, -1=desc
let _search = '';
let _filtered = [];
let _selectedRow = null;
let _searchTimer = null;

// Colonnes par dataset
// Note : les champs tmdbRating, pays, providers, lastDetailsFetch sont INLINE (V2)
const COLS = {
  films: [
    { key: 'titre',            label: 'Titre du film',      w: '22%' },
    { key: 'notePresse',       label: 'Note presse',        w: '7%',  num: true },
    { key: 'noteSpect',        label: 'Note spectateurs',   w: '8%',  num: true },
    { key: 'tmdbRating',       label: 'Note TMDB',          w: '7%',  num: true },
    { key: 'anneeSortie',      label: 'Année',              w: '5%',  num: true },
    { key: 'pays',             label: 'Pays',               w: '8%' },
    { key: 'genre',            label: 'Genre',              w: '13%' },
    { key: 'realisateur',      label: 'Réalisateur',        w: '12%' },
    { key: '_providers',       label: 'Plateformes',        w: '9%',  num: true },
    { key: 'allocineId',       label: 'ID AlloCiné',        w: '7%',  num: true },
    { key: 'dateEntree',       label: 'Ajouté le',          w: '8%' },
    { key: '_lastFetch',       label: 'Détails fetché le',  w: '9%' },
  ],
  bestever: [
    { key: 'titre',            label: 'Titre du film',      w: '22%' },
    { key: 'notePresse',       label: 'Note presse',        w: '7%',  num: true },
    { key: 'noteSpect',        label: 'Note spectateurs',   w: '8%',  num: true },
    { key: 'tmdbRating',       label: 'Note TMDB',          w: '7%',  num: true },
    { key: 'decade',           label: 'Décennie',           w: '6%',  num: true },
    { key: 'anneeSortie',      label: 'Année',              w: '5%',  num: true },
    { key: 'pays',             label: 'Pays',               w: '8%' },
    { key: 'genre',            label: 'Genre',              w: '12%' },
    { key: 'realisateur',      label: 'Réalisateur',        w: '11%' },
    { key: '_providers',       label: 'Plateformes',        w: '8%',  num: true },
    { key: 'allocineId',       label: 'ID AlloCiné',        w: '6%',  num: true },
  ],
  cinema: [
    { key: 'titre',            label: 'Titre du film',      w: '22%' },
    { key: 'notePresse',       label: 'Note presse',        w: '7%',  num: true },
    { key: 'noteSpect',        label: 'Note spectateurs',   w: '8%',  num: true },
    { key: 'tmdbRating',       label: 'Note TMDB',          w: '7%',  num: true },
    { key: 'dateSortie',       label: 'Sortie ciné',        w: '9%' },
    { key: 'nbSeances',        label: 'Nb séances',         w: '7%',  num: true },
    { key: 'anneeSortie',      label: 'Année',              w: '5%',  num: true },
    { key: 'genre',            label: 'Genre',              w: '13%' },
    { key: 'realisateur',      label: 'Réalisateur',        w: '12%' },
    { key: '_providers',       label: 'Plateformes VOD',    w: '9%',  num: true },
    { key: 'allocineId',       label: 'ID AlloCiné',        w: '7%',  num: true },
  ],
  series: [
    { key: 'titre',            label: 'Titre de la série',  w: '22%' },
    { key: 'notePresse',       label: 'Note presse',        w: '7%',  num: true },
    { key: 'noteSpect',        label: 'Note spectateurs',   w: '8%',  num: true },
    { key: 'tmdbRating',       label: 'Note TMDB',          w: '7%',  num: true },
    { key: 'anneeSortie',      label: 'Année début',        w: '5%',  num: true },
    { key: 'pays',             label: 'Pays',               w: '8%' },
    { key: 'nbSaisons',        label: 'Saisons',            w: '5%',  num: true },
    { key: 'statut',           label: 'Statut',             w: '8%' },
    { key: '_providers',       label: 'Plateformes',        w: '9%',  num: true },
    { key: 'allocineId',       label: 'ID AlloCiné',        w: '7%',  num: true },
    { key: 'dateEntree',       label: 'Ajouté le',          w: '8%' },
    { key: '_lastFetch',       label: 'Détails fetché le',  w: '8%' },
  ],
};

// ── Helpers inline ────────────────────────────────────────────────────────────
// V2 : enrichit chaque objet avec des champs calculés pour l'affichage
function enrichFilm(f) {
  return {
    ...f,
    _providers: Array.isArray(f.providers) ? f.providers.length : 0,
    _lastFetch: f.lastDetailsFetch ? f.lastDetailsFetch.slice(0, 10) : null,
  };
}
function enrichSerie(s) {
  return {
    ...s,
    _providers: Array.isArray(s.providers) ? s.providers.length : 0,
    _lastFetch: s.lastDetailsFetch ? s.lastDetailsFetch.slice(0, 10) : null,
  };
}

// ── Chargement ────────────────────────────────────────────────────────────────
async function loadAll() {
  const [rFilms, rBE, rCinema, rSeries] = await Promise.all([
    fetch('/api/films').then(r => r.json()),
    fetch('/api/bestever').then(r => r.json()),
    fetch('/api/cinema').then(r => r.json()),
    fetch('/api/series').then(r => r.json()),
  ]);

  // V2 : tmdbRating, pays, providers, lastDetailsFetch sont directement dans chaque objet
  _data.films   = (rFilms.films   || []).map(enrichFilm);
  _data.bestever = (rBE.films     || []).map(enrichFilm);
  _data.cinema  = (rCinema.films  || []).map(enrichFilm);
  _data.series  = (rSeries.series || []).map(enrichSerie);

  document.getElementById('loading').style.display = 'none';
  document.getElementById('table-wrap').style.display = '';
  renderTable();
}

// ── Navigation ────────────────────────────────────────────────────────────────
const TAB_KEYS = ['films', 'bestever', 'cinema', 'series'];

function switchTab(tab) {
  _currentTab = tab;
  _sortCol = null; _sortDir = 1; _search = '';
  document.getElementById('search-input').value = '';
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', TAB_KEYS[i] === tab);
  });
  updateColSelect();
  closeDetail();
  renderTable();
}

function updateColSelect() {
  const sel = document.getElementById('col-select');
  const cols = COLS[_currentTab];
  sel.innerHTML = '<option value="">Toutes les colonnes</option>' +
    cols.map((c, i) => `<option value="${i}">${c.label}</option>`).join('');
}

function onSearch(val) {
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(() => { _search = val.toLowerCase(); renderTable(); }, 150);
}
function clearSearch() {
  document.getElementById('search-input').value = '';
  _search = '';
  renderTable();
}

function updateSortBar() {
  const pill = document.getElementById('sort-pill');
  if (_sortCol === null) {
    pill.className = 'sort-pill none';
    pill.innerHTML = 'Aucun';
    pill.onclick = null;
    return;
  }
  const col = COLS[_currentTab][_sortCol];
  const dir = _sortDir === 1 ? '▲ Croissant' : '▼ Décroissant';
  pill.className = 'sort-pill';
  pill.innerHTML = `${col.label} <span style="opacity:.7">${dir}</span> &nbsp;<span style="color:var(--red);font-size:10px">✕</span>`;
  pill.onclick = () => { _sortCol = null; _sortDir = 1; renderTable(); };
}

// ── Rendu table ──────────────────────────────────────────────────────────────
function renderTable() {
  const cols = COLS[_currentTab];
  const rows = _data[_currentTab];

  // Filtre recherche (avec restriction de colonne si sélectionnée)
  const colSelIdx = document.getElementById('col-select')?.value;
  const searchCols = (colSelIdx !== '' && colSelIdx !== undefined)
    ? [cols[Number(colSelIdx)]]
    : cols;

  _filtered = _search
    ? rows.filter(r => searchCols.some(c => {
        const v = r[c.key];
        return v != null && String(v).toLowerCase().includes(_search);
      }))
    : [...rows];

  // Tri
  if (_sortCol !== null) {
    const col = cols[_sortCol];
    _filtered.sort((a, b) => {
      let va = a[col.key], vb = b[col.key];
      if (va == null) va = col.num ? -Infinity : '';
      if (vb == null) vb = col.num ? -Infinity : '';
      if (col.num) return (Number(va) - Number(vb)) * _sortDir;
      return String(va).localeCompare(String(vb), 'fr') * _sortDir;
    });
  }

  // Header
  const thead = document.getElementById('thead');
  thead.innerHTML = '<tr>' + cols.map((c, i) => {
    const cls = _sortCol === i ? (_sortDir === 1 ? 'sort-asc' : 'sort-desc') : '';
    return `<th class="${cls}" style="width:${c.w}" onclick="sortBy(${i})">${c.label}</th>`;
  }).join('') + '</tr>';

  // Body
  const tbody = document.getElementById('tbody');
  if (_filtered.length === 0) {
    tbody.innerHTML = '';
    document.getElementById('empty').style.display = '';
  } else {
    document.getElementById('empty').style.display = 'none';
    tbody.innerHTML = _filtered.map((r, ri) => {
      const cells = cols.map(c => {
        let v = r[c.key];
        let cls = c.num ? 'num' : '';

        // Colorisation
        if (c.key === 'notePresse') cls += v >= 4 ? ' green' : ' orange';
        if (c.key === 'noteSpect')  cls += (v != null && v >= 3.5) ? ' green' : ' muted';
        if (c.key === 'tmdbRating') cls += (v != null && v > 0) ? ' green' : ' muted';
        if (c.key === '_providers') cls += (v > 0) ? ' green' : ' muted';
        if (c.key === 'nbSeances')  cls += (v > 0) ? '' : ' muted';

        // Valeur vide
        if (v == null || v === '') return `<td class="${cls.trim()}"><span class="badge">—</span></td>`;

        // Formatages spéciaux
        if ((c.key === 'dateEntree' || c.key === '_lastFetch' || c.key === 'dateSortie') && v) {
          const d = new Date(v);
          v = isNaN(d) ? v : d.toLocaleDateString('fr-FR');
        }
        if (c.key === '_providers') {
          if (v === 0) return `<td class="${cls.trim()} muted"><span class="badge">—</span></td>`;
          return `<td class="${cls.trim()}">${v}</td>`;
        }
        if (c.key === 'statut' && v) {
          const color = v === 'Terminée' ? 'var(--muted)' : 'var(--green)';
          return `<td><span style="color:${color};font-size:11px">${v}</span></td>`;
        }
        if (c.num && typeof v === 'number') {
          v = Number.isInteger(v) ? v : v.toFixed(1);
        }
        const str = String(v);
        return `<td class="${cls.trim()}" title="${str.replace(/"/g,'&quot;')}">${str.length > 40 ? str.slice(0, 38) + '…' : str}</td>`;
      }).join('');
      return `<tr data-ri="${ri}" onclick="selectRow(${ri})">${cells}</tr>`;
    }).join('');
  }

  // Stats
  const total = rows.length;
  const shown = _filtered.length;
  document.getElementById('stats-lbl').textContent = shown < total ? `${shown} / ${total}` : `${total} entrée${total > 1 ? 's' : ''}`;
  document.getElementById('footer-info').textContent = `${_currentTab} · ${shown} / ${total} entrée${total > 1 ? 's' : ''}`;

  updateSortBar();
  _selectedRow = null;
}

function sortBy(colIdx) {
  if (_sortCol === colIdx) _sortDir *= -1;
  else { _sortCol = colIdx; _sortDir = -1; }
  renderTable();
}

// ── Détail JSON ───────────────────────────────────────────────────────────────
function selectRow(ri) {
  const row = _filtered[ri];
  if (!row) return;

  // Toggle : clic sur la même ligne = fermer
  if (_selectedRow === ri) { closeDetail(); return; }
  _selectedRow = ri;

  // Surligner la ligne sélectionnée
  document.querySelectorAll('tbody tr').forEach(tr => {
    tr.classList.toggle('selected', parseInt(tr.dataset.ri) === ri);
  });

  // Afficher l'objet brut V2 (sans les clés helper préfixées _)
  const display = {};
  Object.entries(row).forEach(([k, v]) => {
    if (k.startsWith('_')) return;
    display[k] = v;
  });

  const titre = row.titre || `ID ${row.allocineId}`;
  document.getElementById('detail-title').textContent = titre;
  document.getElementById('detail-json').textContent = JSON.stringify(display, null, 2);
  document.getElementById('detail-panel').classList.add('show');
}

function closeDetail() {
  _selectedRow = null;
  document.querySelectorAll('tbody tr').forEach(tr => tr.classList.remove('selected'));
  document.getElementById('detail-panel').classList.remove('show');
}

// ── Init ─────────────────────────────────────────────────────────────────────
(async () => {
  const ok = await checkAuth();
  if (!ok) return;
  document.getElementById('app').style.display = '';
  updateColSelect();
  await loadAll();
})();
</script>
</body>
