<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Séries VOD">
<link rel="apple-touch-icon" href="/icon-192.svg">
<link rel="manifest" href="/manifest.json">
<title>📺 Séries · AlloCiné</title>
<style>
/* ══════════════════════════════════════════════════════
   DESIGN SYSTEM — Variables de couleur et box-sizing
   ══════════════════════════════════════════════════════ */
:root {
  --navy:   #0d2137;
  --blue2:  #1a3550;
  --blue3:  #2a4f70;
  --gold:   #f0c040;
  --text:   #d0e0f0;
  --muted:  #7090a0;
  --green:  #4caf7d;
  --orange: #e08030;
  --purple: #9b59b6;
  --st: env(safe-area-inset-top, 0px);
  --sb: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  background: var(--navy); color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
  padding-top: calc(56px + var(--st));
  padding-bottom: calc(60px + var(--sb));
  min-height: 100dvh;
}

/* ── Tab bar navigation ── */
.tab-bar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
  height: calc(56px + var(--sb)); padding-bottom: var(--sb);
  background: rgba(13,33,55,.97); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border-top: 1px solid var(--blue3);
  display: flex; align-items: stretch;
}
.tab-item {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 3px; text-decoration: none; color: var(--muted); transition: color .15s;
}
.tab-item:active { opacity: .7; }
.tab-item.active { color: var(--gold); }
.tab-icon { font-size: 22px; line-height: 1; }
.tab-label { font-size: 10px; font-weight: 600; letter-spacing: .2px; }

/* ── Barre de progression scraping (en haut, 3px, dorée) ── */
#auto-scrape-bar { position: fixed; top: 0; left: 0; right: 0; z-index: 999; height: 3px; pointer-events: none; }
#auto-scrape-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--gold), #ffe080); transition: width 2s ease; border-radius: 0 2px 2px 0; box-shadow: 0 0 8px rgba(240,192,64,.7); }

/* ── Header fixe ── */
.header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  height: calc(56px + var(--st)); padding-top: var(--st);
  background: rgba(13,33,55,.97); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--blue3);
  display: flex; align-items: center; padding-left: 12px; padding-right: 12px; gap: 8px;
}
.header-back {
  color: var(--gold); font-size: 13px; text-decoration: none; white-space: nowrap;
  padding: 5px 8px; border: 1px solid rgba(240,192,64,.25); border-radius: 8px;
  flex-shrink: 0; transition: background .15s;
}
.header-back:hover { background: rgba(240,192,64,.1); }
.header-title { font-size: 17px; font-weight: 700; color: var(--gold); flex: 1; }
.header-status { font-size: 11px; color: var(--muted); white-space: nowrap; }

/* Badge profil actif dans le header */
#profile-header-badge {
  display: none; align-items: center; gap: 4px;
  background: rgba(240,192,64,.1); border: 1px solid rgba(240,192,64,.25);
  border-radius: 14px; padding: 4px 10px; font-size: 12px; color: var(--gold);
  cursor: pointer; white-space: nowrap; flex-shrink: 0;
}
#scrape-indicator {
  display: none; align-items: center; gap: 4px;
  font-size: 10px; color: var(--gold);
  background: rgba(240,192,64,.08); border: 1px solid rgba(240,192,64,.25);
  border-radius: 8px; padding: 2px 7px; white-space: nowrap; flex-shrink: 0;
}
#scrape-indicator.show { display: flex; }
#scrape-indicator .si-dot {
  width: 5px; height: 5px; border-radius: 50%; background: var(--gold);
  animation: si-pulse .9s ease-in-out infinite alternate;
}
@keyframes si-pulse { from { opacity: .3; } to { opacity: 1; } }

/* Bouton menu hamburger */
.menu-btn {
  background: none; border: 1px solid var(--blue3); color: var(--muted);
  border-radius: 8px; width: 32px; height: 32px; font-size: 16px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: color .15s, border-color .15s;
}
.menu-btn:active, .menu-btn.open { color: var(--gold); border-color: var(--gold); }

/* ── Menu déroulant ── */
.menu-dropdown {
  display: none; position: fixed;
  top: calc(56px + var(--st) + 6px); right: 12px;
  background: #0f2540; border: 1px solid var(--blue3);
  border-radius: 12px; z-index: 400; min-width: 190px;
  box-shadow: 0 8px 24px rgba(0,0,0,.5); overflow: hidden;
}
.menu-dropdown.open { display: block; }
.menu-item {
  display: flex; align-items: center; gap: 10px;
  width: 100%; padding: 14px 16px;
  background: none; border: none; border-bottom: 1px solid rgba(42,79,112,.3);
  color: var(--text); font-size: 14px; cursor: pointer; text-align: left;
}
.menu-item:last-child { border-bottom: none; }
.menu-item:active { background: rgba(255,255,255,.06); }
.menu-item:disabled { opacity: .4; cursor: default; }
.menu-separator { height: 1px; background: rgba(42,79,112,.5); }

/* ── Sous-menu Debug ── */
.menu-item-sub {
  display: flex; align-items: center; justify-content: space-between;
  width: 100%; padding: 14px 16px;
  background: none; border: none; border-bottom: 1px solid rgba(42,79,112,.3);
  color: var(--muted); font-size: 13px; cursor: pointer; text-align: left;
}
.menu-item-sub:active { background: rgba(255,255,255,.06); }
.menu-item-sub .sub-arrow { font-size: 10px; transition: transform .2s; }
.menu-item-sub.open .sub-arrow { transform: rotate(90deg); }
.submenu {
  display: none; background: rgba(0,0,0,.2);
  border-bottom: 1px solid rgba(42,79,112,.3);
}
.submenu.open { display: block; }
.submenu .menu-item {
  padding-left: 28px; font-size: 13px; color: var(--muted);
  border-bottom: 1px solid rgba(42,79,112,.15);
}
.submenu .menu-item:last-child { border-bottom: none; }

/* ── Barres de progression (scraping liste + chargement détails) ── */
.prog-zone { padding: 8px 14px 4px; display: none; }
.prog-zone.show { display: block; }
.prog-lbl { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
.prog-track { background: var(--blue2); border-radius: 3px; height: 5px; overflow: hidden; }
.prog-fill { height: 100%; border-radius: 3px; width: 0%; transition: width .3s; background: var(--gold); }
.prog-fill.green { background: var(--green); }

/* ── Barre de filtres (masquée jusqu'au premier chargement) ── */
.filter-bar {
  display: none; padding: 8px 12px;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  scrollbar-width: none; gap: 6px;
  border-bottom: 1px solid var(--blue2); align-items: center;
}
.filter-bar.show { display: flex; }
.filter-bar::-webkit-scrollbar { display: none; }
.filter-bar select {
  background: var(--blue2); border: 1px solid var(--blue3); color: var(--text);
  padding: 6px 10px; border-radius: 20px; font-size: 13px;
  flex-shrink: 0; -webkit-appearance: none; cursor: pointer;
}
.filter-toggle { flex-shrink: 0; cursor: pointer; }
.filter-toggle input { display: none; }
.filter-toggle span {
  display: inline-block; padding: 6px 10px; border-radius: 20px; font-size: 12px;
  background: var(--blue2); border: 1px solid var(--blue3); color: var(--muted); white-space: nowrap; transition: all .15s;
}
.filter-toggle input:checked + span { border-color: var(--gold); color: var(--gold); background: rgba(240,192,64,.08); }

/* ── Compteur de résultats ── */
.stats { padding: 6px 14px; font-size: 11px; color: var(--muted); display: none; }
.stats.show { display: block; }

/* ── Bandeau d'erreur / message temporaire ── */
#error-banner { margin: 8px 12px; padding: 10px 14px; background: rgba(180,50,50,.25);
  border: 1px solid rgba(200,80,80,.4); border-radius: 10px; font-size: 13px; color: #f08080; display: none; }

/* ── Grille de cartes ── */
.cards { padding: 6px 10px; display: flex; flex-direction: column; gap: 6px; }
.card {
  background: var(--blue2); border: 1px solid var(--blue3);
  border-radius: 12px; padding: 10px 12px; cursor: pointer; transition: border-color .12s;
}
.card:active { border-color: var(--gold); }
.card-top { display: flex; align-items: flex-start; gap: 10px; }
.card-poster { width: 64px; flex-shrink: 0; border-radius: 6px; overflow: hidden; background: var(--blue3); aspect-ratio: 2/3; }
.card-poster img { width: 100%; height: 100%; object-fit: cover; display: block; }
.card-poster-ph { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 22px; color: var(--blue3); background: var(--navy); }
.card-info { flex: 1; min-width: 0; }
.card-title { font-size: 14px; font-weight: 600; color: #fff; line-height: 1.25; }
.card-creator { font-size: 11px; color: var(--text); margin-top: 3px; }
.card-creator strong { font-weight: 600; }
.card-meta  { font-size: 11px; color: var(--muted); margin-top: 2px; display: flex; flex-wrap: wrap; gap: 5px; align-items: center; }

/* Badges statut */
.statut-badge {
  display: inline-block; font-size: 9px; font-weight: 700; border-radius: 6px; padding: 2px 6px;
}
.statut-badge.encours  { background: rgba(76,175,125,.2); border: 1px solid rgba(76,175,125,.5); color: #4caf7d; }
.statut-badge.terminee { background: rgba(112,144,160,.15); border: 1px solid rgba(112,144,160,.35); color: var(--muted); }
.saisons-badge { font-size: 10px; color: var(--muted); }

/* Label "Depuis XXXX" avec point vert animé pour les séries encore en cours */
.depuis-label { color: var(--green); font-weight: 600; font-size: 11px; display: inline-flex; align-items: center; gap: 4px; }
.live-dot {
  display: inline-block; width: 6px; height: 6px; border-radius: 50%;
  background: var(--green); flex-shrink: 0;
  animation: pulse-live 1.6s ease-in-out infinite;
}
@keyframes pulse-live {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%       { opacity: .35; transform: scale(.65); }
}

.card-genre { font-size: 11px; color: var(--muted); margin-top: 2px; }

/* Bloc de notes (presse + spectateurs) */
.card-scores { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.score-block { text-align: center; }
.score-val { font-size: 17px; font-weight: 700; line-height: 1; }
.score-val.green  { color: var(--green); }
.score-val.orange { color: var(--orange); }
.score-val.muted  { color: var(--muted); font-size: 14px; }
.score-lbl { font-size: 8px; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; }
.score-sep { width: 1px; height: 18px; background: var(--blue3); }

/* Badges plateformes */
.card-plats { margin-top: 6px; display: flex; flex-wrap: wrap; gap: 4px; }
.pb { font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 500; }
.pb.svod     { background: rgba(76,175,125,.2);  border: 1px solid rgba(76,175,125,.4);  color: #4caf7d; }
.pb.location { background: rgba(240,192,64,.15); border: 1px solid rgba(240,192,64,.35); color: var(--gold); }
.pb.achat    { background: rgba(224,128,48,.15); border: 1px solid rgba(224,128,48,.35); color: var(--orange); }
.pb.vod      { background: rgba(255,255,255,.08);border: 1px solid rgba(255,255,255,.15);color: var(--text); }
.pb-loading  { color: var(--muted); font-size: 11px; font-style: italic; }
.pb-none     { color: var(--muted); font-size: 11px; }

/* Synopsis tronqué avec "Lire la suite" */
.card-synopsis-wrap { margin-top: 7px; padding-top: 7px; border-top: 1px solid rgba(42,79,112,.5); font-size: 12px; color: var(--text); line-height: 1.5; }
.card-synopsis-rest { display: none; }
.card-synopsis-rest.show { display: inline; }
.card-more-btn { color: var(--gold); font-size: 11px; cursor: pointer; margin-left: 3px; white-space: nowrap; }

/* Boutons d'action utilisateur (Vu / À voir / À suivre / Non) */
.card-ua { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; padding-top: 7px; border-top: 1px solid rgba(42,79,112,.5); }
.ua-btn {
  flex: 1; background: none; border: 1px solid var(--blue3); color: var(--muted);
  border-radius: 8px; padding: 5px 4px; font-size: 11px; cursor: pointer; text-align: center; transition: all .15s;
}
.ua-btn.active-vu     { border-color: #4caf7d; color: #4caf7d; background: rgba(76,175,125,.12); }
.ua-btn.active-voir   { border-color: #3498db; color: #3498db; background: rgba(52,152,219,.12); }
.ua-btn.active-suivre { border-color: #f0c040; color: #f0c040; background: rgba(240,192,64,.12); }
.ua-btn.active-nope   { border-color: #e74c3c; color: #e74c3c; background: rgba(231,76,60,.12); }
.ua-note-ac { flex-basis: 100%; text-align: center; font-size: 11px; color: var(--gold, #f0c040); letter-spacing: 1px; margin-top: 2px; }
.ua-note-ac .ua-note-val { font-size: 10px; opacity: .75; margin-left: 3px; }

/* Message "Aucun résultat" */
.empty { text-align: center; padding: 60px 20px; color: var(--muted); display: none; }
.empty.show { display: block; }

/* ══════════════════════════════════════════════════════
   MODALS (bottom sheets)
   ══════════════════════════════════════════════════════ */
#confirm-modal, #info-modal, #prefs-modal, #profiles-modal {
  display: none; position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,.7); align-items: flex-end; justify-content: center;
  padding-bottom: var(--sb);
}
#confirm-modal.open, #info-modal.open, #prefs-modal.open, #profiles-modal.open { display: flex; }
.sheet {
  background: #0f2540; border-radius: 18px 18px 0 0;
  padding: 20px 20px calc(20px + var(--sb)); width: 100%; max-height: 80vh; overflow-y: auto;
}
.sheet h3 { color: var(--gold); font-size: 15px; margin-bottom: 16px; }
.sheet-close-btn {
  width: 100%; margin-top: 16px; padding: 12px; border-radius: 10px;
  background: var(--blue3); border: none; color: var(--text); font-size: 14px; font-weight: 600; cursor: pointer;
}
.confirm-note {
  display: flex; justify-content: space-between; align-items: center;
  margin: 14px 0 18px; padding: 12px 14px; background: rgba(255,255,255,.04); border-radius: 10px; border: 1px solid var(--blue3);
}
.note-label { font-size: 13px; color: var(--text); }
.note-input { width: 52px; background: var(--blue2); border: 1px solid var(--blue3); color: var(--text); border-radius: 8px; padding: 5px 6px; font-size: 13px; text-align: center; }
.confirm-btns { display: flex; gap: 10px; }
.confirm-btns button { flex: 1; padding: 13px; border-radius: 10px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; }
.btn-confirm { background: var(--gold); color: #000; }
.btn-cancel  { background: var(--blue3); color: var(--text); }
.last-scrape-info { font-size: 12px; color: var(--muted); margin-bottom: 20px; }

/* Lignes d'info (modal ℹ) */
.info-row { display: flex; justify-content: space-between; padding: 9px 0; border-bottom: 1px solid rgba(42,79,112,.4); gap: 12px; }
.info-row:last-of-type { border-bottom: none; }
.info-row .lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
.info-row .val { font-size: 12px; color: var(--text); text-align: right; }
.info-section-title { font-size: 10px; font-weight: 700; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; margin-top: 14px; margin-bottom: 2px; padding-bottom: 4px; border-bottom: 1px solid rgba(240,192,64,.2); }
.info-section-title:first-child { margin-top: 0; }
.info-errors { margin-top: 10px; font-size: 11px; color: #e74c3c; line-height: 1.6; }
.info-progress { margin-top: 6px; }
.info-progress-bar-wrap { height: 4px; background: rgba(42,79,112,.5); border-radius: 2px; overflow: hidden; margin-top: 3px; }
.info-progress-bar { height: 100%; background: var(--gold); border-radius: 2px; transition: width .4s ease; }
.info-progress-label { font-size: 10px; color: var(--gold); display: flex; justify-content: space-between; }
.info-scraping-badge { display: inline-block; font-size: 10px; color: var(--gold); background: rgba(240,192,64,.1); border: 1px solid rgba(240,192,64,.3); border-radius: 4px; padding: 1px 5px; margin-left: 6px; vertical-align: middle; animation: pulse-badge .8s ease-in-out infinite alternate; }
@keyframes pulse-badge { from { opacity: .6; } to { opacity: 1; } }

/* Préférences toggles */
.prefs-section { margin-bottom: 20px; }
.prefs-section-title { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
.pref-row { display: flex; justify-content: space-between; align-items: center; padding: 13px 0; border-bottom: 1px solid rgba(42,79,112,.3); }
.pref-row:last-child { border-bottom: none; }
.pref-label { font-size: 14px; color: var(--text); }
.toggle { position: relative; width: 44px; height: 26px; flex-shrink: 0; }
.toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
.toggle-slider { position: absolute; inset: 0; cursor: pointer; background: var(--blue3); border-radius: 13px; transition: background .2s; }
.toggle-slider::before { content: ''; position: absolute; width: 20px; height: 20px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: transform .2s; }
.toggle input:checked + .toggle-slider { background: var(--gold); }
.toggle input:checked + .toggle-slider::before { transform: translateX(18px); }

/* Profils */
.profile-row { display: flex; justify-content: space-between; align-items: center; padding: 13px 0; border-bottom: 1px solid rgba(42,79,112,.3); cursor: pointer; }
.profile-row:last-child { border-bottom: none; }
.profile-row.active { cursor: default; }
.profile-name { font-size: 14px; color: var(--text); }
.profile-badge-active { font-size: 11px; color: var(--gold); }
.profile-badge-switch { font-size: 11px; color: var(--muted); }
.profile-delete-btn { background: none; border: none; cursor: pointer; font-size: 14px; opacity: .5; padding: 2px 4px; border-radius: 4px; transition: opacity .15s; }
.profile-delete-btn:hover { opacity: 1; }
.add-user-row { display: flex; gap: 8px; align-items: center; margin-top: 16px; }
.add-user-input { flex: 1; background: var(--blue2); border: 1px solid var(--blue3); color: var(--text); border-radius: 8px; padding: 10px 12px; font-size: 14px; }
.add-user-btn { background: var(--gold); color: #000; border: none; border-radius: 8px; padding: 10px 14px; font-size: 14px; font-weight: 700; cursor: pointer; white-space: nowrap; }

/* ── Responsive desktop (> 700px) ── */
@media (min-width: 700px) {
  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 12px; padding: 12px 20px; }
  .header { padding-left: 24px; padding-right: 20px; }
  .filter-bar { padding: 10px 20px; }
  .stats { padding: 6px 20px; }
}
</style>
</head>
<body>
<div id="auto-scrape-bar"><div id="auto-scrape-fill"></div></div>

<!-- ── Modal : confirmation scraping ── -->
<div id="confirm-modal">
  <div class="sheet">
    <h3 id="confirm-title">🔄 Lancer le scraping ?</h3>
    <div id="confirm-body"></div>
    <div class="last-scrape-info" id="confirm-last-scrape"></div>
    <div class="confirm-btns">
      <button class="btn-cancel"  onclick="closeConfirmSeries()">Annuler</button>
      <button class="btn-confirm" id="confirm-ok-btn" onclick="">Confirmer</button>
    </div>
  </div>
</div>

<!-- ── Modal : informations serveur ── -->
<div id="info-modal" onclick="if(event.target===this)closeInfo()">
  <div class="sheet">
    <h3>ℹ Informations</h3>
    <div id="info-content">Chargement…</div>
    <button class="sheet-close-btn" onclick="closeInfo()">Fermer</button>
  </div>
</div>

<!-- ── Modal : sélection de profil ── -->
<div id="profiles-modal" onclick="if(event.target===this)closeProfiles()">
  <div class="sheet">
    <h3>👤 Profils</h3>
    <div id="profiles-content"><p style="color:var(--muted);font-size:13px;padding:10px 0">Chargement…</p></div>
    <button class="sheet-close-btn" onclick="closeProfiles()">Fermer</button>
  </div>
</div>

<!-- ── Modal : préférences d'affichage ── -->
<div id="prefs-modal" onclick="if(event.target===this)closePrefs()">
  <div class="sheet">
    <h3>🔖 Mes préférences</h3>
    <div id="prefs-content"></div>
    <button class="sheet-close-btn" onclick="closePrefs()">Fermer</button>
  </div>
</div>

<!-- ── Header ── -->
<div class="header">
  <div style="display:flex;align-items:center;gap:8px;flex:1;min-width:0;overflow:hidden;">
    <div class="header-title">📺 Séries</div>
  </div>
  <div id="scrape-indicator"><span class="si-dot"></span><span id="scrape-indicator-label"></span></div>
  <div class="header-status" id="server-status" style="display:none;"></div>
  <div id="profile-header-badge" onclick="openProfiles()">
    👤 <span id="profile-name-serie">—</span>
  </div>
  <button class="menu-btn" id="menu-btn" onclick="toggleMenu(event)">☰</button>
</div>

<!-- ── Menu déroulant ── -->
<div class="menu-dropdown" id="menu-dropdown">
  <button class="menu-item" onclick="closeMenu();openPrefs()">🔖 Préférences</button>
  <button class="menu-item" onclick="closeMenu();openInfo()">ℹ Info</button>

<!-- shared.js : fonctions communes films & séries (profils, userdata, prefs serveur, badges plateformes…) -->
<script src="/shared.js"></script>
<script>
// ══════════════════════════════════════════════════════════════════════════════
//  ÉTAT GLOBAL
// ══════════════════════════════════════════════════════════════════════════════

let _allSeries    = [];   // tableau de séries actuellement affiché (trié)
let _seriesDet    = {};   // allocineId → détails { statut, pays, nbSaisons, providers, … }
let _seriesSortBy = 'presse'; // critère de tri courant

// ── Clés localStorage ─────────────────────────────────────────────────────────
const LS_SERIES   = 'vod_series';
const LS_SDET     = 'vod_series_details';
const LS_SDATE    = 'vod_series_updated';
// ⚠ Incrémenter LS_SVERSION à chaque changement de format des données en cache
const LS_SVERSION = 'vod_series_v1'; // ⚠️ changer UNIQUEMENT si le format des données évolue


// ══════════════════════════════════════════════════════════════════════════════
//  CACHE LOCALSTORAGE
//  Évite un rechargement complet depuis le serveur à chaque ouverture.
//  Le cache est invalidé si la version LS_SVERSION change.
// ══════════════════════════════════════════════════════════════════════════════

/**
 * Sauvegarde la liste des séries et les détails dans localStorage.
 * Appelé après chaque chargement réussi depuis le serveur ou un scraping.
 */
function saveSeriesCache() {
  try {
    localStorage.setItem(LS_SERIES, JSON.stringify(_allSeries));
    localStorage.setItem(LS_SDET,   JSON.stringify(_seriesDet));
    localStorage.setItem(LS_SDATE,  new Date().toISOString());
  } catch(e) {}
}

/**
 * Charge la liste des séries depuis localStorage.
 * Si la version est différente de LS_SVERSION, invalide le cache.
 * @returns {boolean} true si des données ont été chargées et affichées
 */
function loadSeriesCache() {
  try {
    if (localStorage.getItem('vod_series_version') !== LS_SVERSION) {
      // Invalide les anciennes données si le format a changé
      localStorage.removeItem(LS_SERIES);
      localStorage.removeItem(LS_SDET);
      localStorage.removeItem(LS_SDATE);
      localStorage.setItem('vod_series_version', LS_SVERSION);
      return false;
    }
    const raw = localStorage.getItem(LS_SERIES);
    if (!raw) return false;
    _allSeries = JSON.parse(raw);
    const det  = localStorage.getItem(LS_SDET);
    if (det) _seriesDet = JSON.parse(det);
    if (_allSeries.length > 0) {
      renderSeriesCards(_allSeries);
      populateGenreFilter(); populateAnneeFilter();
      document.getElementById('filter-bar').classList.add('show');
      document.getElementById('stats').classList.add('show');
      const statusEl = document.getElementById('server-status');
      if (statusEl) statusEl.textContent = '📦'; // indique que les données viennent du cache local
      return true;
    }
    return false;
  } catch(e) { return false; }
}


// ══════════════════════════════════════════════════════════════════════════════
//  CHARGEMENT DEPUIS LE SERVEUR
// ══════════════════════════════════════════════════════════════════════════════

/**
 * Charge la liste complète des séries depuis GET /api/series.
 * La réponse inclut déjà les détails en cache (statut, pays, providers)
 * pour éviter des centaines de requêtes individuelles.
 * Déclenche ensuite startSeriesDetailsLoading() pour compléter les détails manquants.
 */
async function loadSeriesFromServer() {
  try {
    const r = await fetch('/api/series');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    if (!d.series || d.series.length === 0) return;
    _allSeries = d.series;
    // Précharge les détails inclus dans la réponse (index aligné sur series[])
    if (d.details) {
      d.details.forEach((det, i) => {
        if (det && _allSeries[i]?.allocineId) {
          _seriesDet[_allSeries[i].allocineId] = det;
        }
      });
    }
    applySeriesSort(_seriesSortBy);
    populateGenreFilter(); populateAnneeFilter();
    saveSeriesCache();
    document.getElementById('filter-bar').classList.add('show');
    document.getElementById('stats').classList.add('show');
    if (d.lastScrape) {
      const dt  = new Date(d.lastScrape);
      const lbl = dt.toLocaleDateString('fr-FR') + ' ' + dt.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
      const statusEl = document.getElementById('server-status');
      if (statusEl) {
        statusEl.textContent = `🟢 ${lbl}`;
        setTimeout(() => { statusEl.textContent = '🟢'; }, 4000);
      }
    }
  } catch(e) {
    showError('Impossible de charger les séries depuis le serveur.');
  }
}


// ══════════════════════════════════════════════════════════════════════════════
//  CHARGEMENT DES DÉTAILS (plateformes, statut, pays…)
//  Effectue des appels GET /api/series/details pour chaque série dont
//  les détails ne sont pas encore en cache (_seriesDet).
//  Les appels sont séquentiels (rate-limit côté serveur).
// ══════════════════════════════════════════════════════════════════════════════

/** Génération courante — permet d'annuler un chargement si un nouveau commence */
let _detLoadGen = 0;

/**
 * Lance le chargement progressif des détails pour les séries qui en manquent.
 * Met à jour chaque carte au fur et à mesure des réponses.
 * Sauvegarde le cache localStorage une fois terminé.
 */
async function startSeriesDetailsLoading() {
  const needsFetch = _allSeries.some(s => s.allocineId && !_seriesDet[s.allocineId]);
  if (!needsFetch) return;
  const gen     = ++_detLoadGen;
  const toFetch = _allSeries.filter(s => s.allocineId && !_seriesDet[s.allocineId]);
  if (toFetch.length === 0) return;

  document.getElementById('plat-zone').classList.add('show');
  document.getElementById('plat-fill').style.width = '0%';

  let done = 0;
  for (const serie of toFetch) {
    if (gen !== _detLoadGen) break; // une nouvelle génération a démarré, on arrête
    try {
      const r = await fetch(`/api/series/details?seriesId=${serie.allocineId}`);
      if (r.ok) {
        const det = await r.json();
        _seriesDet[serie.allocineId] = det;
        updateSeriesCard(_allSeries.indexOf(serie), det);
      }
    } catch(e) {}
    done++;
    const pct = Math.round(done / toFetch.length * 100);
    document.getElementById('plat-fill').style.width = pct + '%';
    document.getElementById('plat-count').textContent = `${done} / ${toFetch.length}`;
  }

  if (gen === _detLoadGen) {
    document.getElementById('plat-lbl').innerHTML = `📺 Détails chargés <span id="plat-count" style="color:var(--gold)">${toFetch.length}</span>`;
    document.getElementById('plat-fill').style.width = '100%';
    saveSeriesCache();
    populateGenreFilter(); populateAnneeFilter();
  }
}


// ══════════════════════════════════════════════════════════════════════════════
//  RENDU DES CARTES
// ══════════════════════════════════════════════════════════════════════════════

/** Clé de déduplication d'une série (titre normalisé + note presse) */
function seriesKey(s) { return `${(s.titre||'').toLowerCase()}|${s.notePresse}`; }

/**
 * Génère le label de date d'une série.
 * Règles :
 *   - Série en cours (enCours=true ou statut="En cours") → "Depuis XXXX"
 *   - Série terminée avec plage                          → "XXXX – XXXX"
 *   - Série terminée en une saison                       → "XXXX"
 *
 * @param {string|null} debut     année de début
 * @param {string|null} fin       année de fin (ou dernière année connue)
 * @param {string}      statut    "En cours" | "Terminée" | ""
 * @param {boolean}     enCours   flag issu du scraping de liste
 * @returns {string}
 */
function buildAnneeLabel(debut, fin, statut, enCours) {
  const live = enCours || statut === 'En cours';
  if (!debut) return fin ? (live ? `Depuis ${fin}` : fin) : '';
  if (live)   return `Depuis ${debut}`;
  if (fin && fin !== debut) return `${debut} – ${fin}`;
  return debut;
}

/**
 * Retourne le HTML du label de date.
 * Si la série est en cours, ajoute un point vert animé (classe "live-dot").
 * @param {string|null} debut
 * @param {string|null} fin
 * @param {string}      statut
 * @param {boolean}     enCours
 * @returns {string} HTML
 */
function buildAnneeLabelHTML(debut, fin, statut, enCours) {
  const label = buildAnneeLabel(debut, fin, statut, enCours);
  if (!label) return '';
  if (label.startsWith('Depuis ')) {
    return `<span class="depuis-label"><span class="live-dot"></span>${esc(label)}</span>`;
  }
  return `<span>${esc(label)}</span>`;
}

/**
 * Génère et injecte le HTML de toutes les cartes séries dans le DOM.
 * Sources des données affichées :
 *   • titre, genre, createur, casting, annees, synopsis, poster → s.* (scraping liste)
 *   • statut, nbSaisons, pays, providers                        → det.* (fiches détail)
 *
 * @param {Array} series  tableau de séries à afficher
 */
function renderSeriesCards(series) {
  const container = document.getElementById('cards');
  container.innerHTML = series.map((s, i) => {
    const det   = _seriesDet[s.allocineId] || {};
    const url   = s.allocineId
      ? `https://www.allocine.fr/series/ficheserie_gen_cserie=${s.allocineId}.html`
      : `https://www.allocine.fr/rechercher/?q=${encodeURIComponent(s.titre)}`;
    const pScore = s.notePresse;
    const sScore = s.noteSpect;
    const statut = det.statut || '';

    const statutBadge = statut === 'En cours'
      ? `<span class="statut-badge encours">▶ En cours</span>`
      : statut === 'Terminée'
        ? `<span class="statut-badge terminee">■ Terminée</span>`
        : '';
    const saisonsBadge = det.nbSaisons
      ? `<span class="saisons-badge">${det.nbSaisons} saison${det.nbSaisons > 1 ? 's' : ''}</span>` : '';

    // Année de fin : priorité à s.anneeFin (liste), sinon det.derniereAnnee (fiche)
    const anneeLabelHTML = buildAnneeLabelHTML(s.anneeSortie, s.anneeFin || det.derniereAnnee, statut, s.enCours);

    // Créateur et casting : uniquement depuis le scraping de liste (s.*)
    const createur = s.createur ? `<div class="card-creator">Par <strong>${esc(s.createur)}</strong></div>` : '';
    const casting  = s.casting  ? `<div class="card-genre" style="font-size:10px">${esc(s.casting)}</div>`  : '';

    // Plateformes : "…" si pas encore chargées, badges si disponibles
    const platHtml = s.allocineId && !det.providers
      ? '<span class="pb-loading">…</span>'
      : renderPlatBadges(det.providers || []);

    // Synopsis tronqué à 120 caractères avec "Lire la suite"
    const synopsis = s.synopsis || '';
    const LIMIT    = 120;
    const short    = synopsis.length > LIMIT ? synopsis.slice(0, synopsis.lastIndexOf(' ', LIMIT)) : synopsis;
    const rest     = synopsis.length > LIMIT ? synopsis.slice(short.length) : '';
    const synHtml  = synopsis
      ? `<div class="card-synopsis-wrap" onclick="event.stopPropagation()">
           <span>${esc(short)}</span>${rest ? `<span class="card-synopsis-rest" id="syn-rest-${i}">${esc(rest)}</span><span class="card-more-btn" id="syn-btn-${i}" onclick="toggleSyn(${i})">… Lire la suite</span>` : ''}
         </div>` : '';

    // Poster (priorité au poster de la fiche détail, puis celui de la liste)
    const posterSrc  = det.poster || s.poster || '';
    const posterHtml = posterSrc
      ? `<div class="card-poster"><img src="${esc(posterSrc)}" alt="" loading="lazy" onerror="posterError(this)"></div>`
      : `<div class="card-poster"><div class="card-poster-ph">📺</div></div>`;

    return `
<div class="card" id="card-${i}" data-idx="${i}" onclick="window.open('${url}','_blank')">
  <div class="card-top">
    ${posterHtml}
    <div class="card-info">
      <div class="card-title">${esc(s.titre)}</div>
      ${createur}
      <div class="card-meta">
        ${anneeLabelHTML}
        ${statutBadge}${saisonsBadge}
        ${det.pays ? `<span>${flagFor(det.pays)}${esc(det.pays.split(',')[0].trim())}</span>` : ''}
      </div>
      ${s.genre ? `<div class="card-genre">${esc(s.genre)}</div>` : ''}
      ${casting}
    </div>
    <div class="card-scores">
      <div class="score-block">
        <div class="score-val ${pScore >= 4 ? 'green' : 'orange'}">${pScore.toFixed(1)}</div>
        <div class="score-lbl">Presse</div>
      </div>
      <div class="score-sep"></div>
      <div class="score-block">
        ${sScore != null
          ? `<div class="score-val ${sScore >= 3.5 ? 'green' : 'muted'}">${sScore.toFixed(1)}</div>`
          : `<div class="score-val muted">—</div>`}
        <div class="score-lbl">Spect.</div>
      </div>
    </div>
  </div>
  ${synHtml}
  <div class="card-plats" id="card-plat-${i}">${platHtml}</div>
  <div id="ua-${i}"></div>
</div>`;
  }).join('');

  // Injecte les boutons d'action utilisateur après le rendu
  series.forEach((s, i) => renderSeriesUA(s, i));
  applySeriesFilters();
}

/**
 * Met à jour une carte série existante dans le DOM après réception des détails
 * (appelé par startSeriesDetailsLoading lors du chargement progressif).
 * Met à jour : plateformes, statut, saisons, pays, label année.
 * NE MET PAS À JOUR : genre, créateur, casting (sources = scraping liste uniquement).
 *
 * @param {number} idx  index dans _allSeries
 * @param {Object} det  détails depuis /api/series/details
 */
function updateSeriesCard(idx, det) {
  if (idx < 0 || idx >= _allSeries.length) return;
  const s = _allSeries[idx];

  // Plateformes
  const platEl = document.getElementById(`card-plat-${idx}`);
  if (platEl) platEl.innerHTML = renderPlatBadges(det.providers || []);

  // Métadonnées (statut, saisons, pays, label année)
  const card = document.getElementById(`card-${idx}`);
  if (!card) return;
  const metaEl = card.querySelector('.card-meta');
  if (metaEl) {
    const statut      = det.statut || '';
    const statutBadge = statut === 'En cours'
      ? `<span class="statut-badge encours">▶ En cours</span>`
      : statut === 'Terminée' ? `<span class="statut-badge terminee">■ Terminée</span>` : '';
    const saisonsBadge   = det.nbSaisons
      ? `<span class="saisons-badge">${det.nbSaisons} saison${det.nbSaisons > 1 ? 's' : ''}</span>` : '';
    const anneeLabelHTML = buildAnneeLabelHTML(s.anneeSortie, s.anneeFin || det.derniereAnnee, statut, s.enCours);
    const paysSpan       = det.pays ? `<span>${flagFor(det.pays)}${esc(det.pays.split(',')[0].trim())}</span>` : '';
    metaEl.innerHTML     = `${anneeLabelHTML}${statutBadge}${saisonsBadge}${paysSpan}`;
  }

  // Genre (depuis les détails si la carte n'en a pas encore)
  const genreVal  = (_allSeries[idx] && _allSeries[idx].genre) || ''; // source : scraping liste uniquement
  let   genreEl   = card.querySelector('.card-genre:not([style])');
  if (genreVal) {
    if (genreEl) {
      genreEl.textContent = genreVal;
    } else {
      const infoEl  = card.querySelector('.card-info');
      const metaEl2 = card.querySelector('.card-meta');
      if (infoEl && metaEl2) {
        const div = document.createElement('div');
        div.className   = 'card-genre';
        div.textContent = genreVal;
        metaEl2.insertAdjacentElement('afterend', div);
      }
    }
  }
  // Créateur, casting et genre viennent uniquement du scraping de liste (s.*) — pas mis à jour ici
}


// ══════════════════════════════════════════════════════════════════════════════
//  ACTIONS UTILISATEUR (Vu / À voir / À suivre / Non)
// ══════════════════════════════════════════════════════════════════════════════

/**
 * Injecte les boutons d'action utilisateur dans la carte série.
 * L'état actif de chaque bouton reflète _userdata["s:allocineId"].
 * @param {Object} serie  objet série
 * @param {number} idx    index dans _allSeries
 */
function renderSeriesUA(serie, idx) {
  const el = document.getElementById(`ua-${idx}`);
  if (!el) return;
  const id = serie.allocineId ? `s:${serie.allocineId}` : null;
  if (!id || !_currentUserId) { el.innerHTML = ''; return; }
  const ud = _userdata[id] || {};
  el.outerHTML = `<div class="card-ua" id="ua-${idx}" onclick="event.stopPropagation()">
    <button class="ua-btn ${ud.vu          ? 'active-vu'     : ''}" onclick="toggleSeriesUA('${id}',${idx},'vu')">👁 Vu</button>
    <button class="ua-btn ${ud.vouloir     ? 'active-voir'   : ''}" onclick="toggleSeriesUA('${id}',${idx},'vouloir')">🔖 À voir</button>
    <button class="ua-btn ${ud.asuivre     ? 'active-suivre' : ''}" onclick="toggleSeriesUA('${id}',${idx},'asuivre')">⏳ À suivre</button>
    <button class="ua-btn ${ud.nonInteresse? 'active-nope'   : ''}" onclick="toggleSeriesUA('${id}',${idx},'nonInteresse')">✕ Non</button>
    ${isJCProfile() && ud.noteAC ? renderNoteAC(ud.noteAC) : ''}
  </div>`;
}

/**
 * Toggle un état utilisateur pour une série (indépendant des films).
 * Persiste via saveUserdata() de shared.js → POST /api/userdata.
 * @param {string} id     clé Redis : "s:allocineId"
 * @param {number} idx    index dans _allSeries
 * @param {string} field  "vu" | "vouloir" | "asuivre" | "nonInteresse"
 */
function toggleSeriesUA(id, idx, field) {
  if (!_currentUserId) return;
  if (!_userdata[id]) _userdata[id] = {};
  _userdata[id][field] = !_userdata[id][field];
  const serie = _allSeries[idx];
  if (serie) renderSeriesUA(serie, idx);
  saveUserdata(id);
}


// ══════════════════════════════════════════════════════════════════════════════
//  TRI
// ══════════════════════════════════════════════════════════════════════════════

/**
 * Trie la liste et re-rend les cartes.
 * Critères disponibles : "presse" | "spectateurs" | "annee"
 * @param {string} sortBy
 */
function applySeriesSort(sortBy) {
  _seriesSortBy = sortBy || 'presse';
  const sorted = [..._allSeries].sort((a, b) => {
    if (_seriesSortBy === 'presse')      return b.notePresse - a.notePresse;
    if (_seriesSortBy === 'spectateurs') return (b.noteSpect ?? 0) - (a.noteSpect ?? 0);
    if (_seriesSortBy === 'combinee') {
      const sa = (a.notePresse ?? 0) + (a.noteSpect ?? 0);
      const sb = (b.notePresse ?? 0) + (b.noteSpect ?? 0);
      return sb - sa || (b.notePresse ?? 0) - (a.notePresse ?? 0);
    }
    if (_seriesSortBy === 'annee')       return (parseInt(b.anneeSortie) || 0) - (parseInt(a.anneeSortie) || 0);
    if (_seriesSortBy === 'noteAC') {
      // Les notes vont de 0.5 à 5 → sans note = 0, toujours en dessous
      const na = (a.allocineId && _userdata[`s:${a.allocineId}`]?.noteAC) || 0;
      const nb = (b.allocineId && _userdata[`s:${b.allocineId}`]?.noteAC) || 0;
      return (nb - na) || (b.notePresse - a.notePresse);
    }
    return 0;
  });
  _allSeries = sorted;
  renderSeriesCards(sorted);
}


// ══════════════════════════════════════════════════════════════════════════════
//  FILTRES
// ══════════════════════════════════════════════════════════════════════════════

/**
 * Remplit le sélecteur de genre avec les genres uniques de _allSeries.
 * Source : s.genre uniquement (scraping liste). Conserve la sélection courante.
 */
function populateGenreFilter() {
  const genres = new Set();
  _allSeries.forEach(s => {
    (s.genre || '').split(',').map(g => g.trim()).filter(Boolean).forEach(g => genres.add(g));
  });
  const sel = document.getElementById('fil-genre');
  const cur = sel.value;
  sel.innerHTML = '<option value="">Tous genres</option>' +
    [...genres].sort().map(g =>
      `<option value="${esc(g.toLowerCase())}"${cur === g.toLowerCase() ? ' selected' : ''}>${esc(g)}</option>`
    ).join('');
}

/**
 * Remplit le sélecteur d'année avec les années de création uniques de _allSeries.
 * Triées du plus ancien au plus récent. Source : s.anneeSortie (scraping liste).
 */
function populateAnneeFilter() {
  const annees = new Set();
  _allSeries.forEach(s => { if (s.anneeSortie) annees.add(s.anneeSortie); });
  const sel = document.getElementById('fil-annee');
  const cur = sel.value;
  sel.innerHTML = '<option value="">Toutes années</option>' +
    [...annees].sort((a, b) => b - a).map(a =>
      `<option value="${a}"${cur === a ? ' selected' : ''}>À partir de ${a}</option>`
    ).join('');
}

/**
 * Applique tous les filtres actifs et masque/affiche les cartes en conséquence.
 * Filtres appliqués :
 *   1. Genre (depuis s.genre, source liste)
 *   2. Statut En cours / Terminée (depuis det.statut, source fiche)
 *   3. Préférences genres : documentaires, animations (depuis _prefs)
 *   4. Liste personnelle : Vu, Non intéressé, À voir, À suivre
 *
 * Met à jour le compteur de résultats et affiche "Aucun résultat" si vide.
 */
function applySeriesFilters() {
  const genreFilter  = document.getElementById('fil-genre').value;
  const anneeFilter  = document.getElementById('fil-annee').value;
  const statutFilter = document.getElementById('fil-statut').value;
  const onlyVoir     = document.getElementById('fil-only-voir')?.checked;
  const onlySuivre   = document.getElementById('fil-only-suivre')?.checked;
  let visible = 0;

  _allSeries.forEach((s, i) => {
    const card = document.getElementById(`card-${i}`);
    if (!card) return;

    const det      = _seriesDet[s.allocineId] || {};
    const genreStr = (s.genre || '').toLowerCase();
    const genres   = genreStr.split(',').map(g => g.trim()).filter(Boolean);
    const ud       = _userdata[s.allocineId ? `s:${s.allocineId}` : ''] || {};

    // Filtre genre (recherche partielle pour gérer "Science-Fiction", "Sci-Fi"…)
    const matchGenre = !genreFilter || genres.some(g => g.includes(genreFilter));
    // Filtre année de création : "à partir de" (>=)
    const matchAnnee = !anneeFilter || (s.anneeSortie && parseInt(s.anneeSortie) >= parseInt(anneeFilter));
    // Filtre préférences documentaires / animations
    const matchDocAnim = (_prefs.showDocumentaires || !genreStr.includes('documentaire')) &&
                         (_prefs.showAnimations    || !genreStr.includes('animation'));
    // Filtre statut : priorité à det.statut (fiche individuelle),
    // fallback sur s.enCours / s.anneeFin (scraping liste) si la fiche n'est pas encore chargée
    const statut = det.statut
      || (s.enCours  ? 'En cours' : '')
      || (s.anneeFin ? 'Terminée' : '');
    const matchStatut = !statutFilter ||
      (statutFilter === 'encours'  && statut === 'En cours') ||
      (statutFilter === 'terminee' && statut === 'Terminée');
    // Filtre liste personnelle
    const matchListe = (!_prefs.hideVus                 || !ud.vu) &&
                       (!_prefs.hideNonInteresse       || !ud.nonInteresse) &&
                       (!onlyVoir                 || !!ud.vouloir) &&
                       (!onlySuivre               || !!ud.asuivre);

    const ok = matchGenre && matchAnnee && matchDocAnim && matchStatut && matchListe;
    card.style.display = ok ? '' : 'none';
    if (ok) visible++;
  });

  document.getElementById('stats').textContent =
    `${visible} série${visible > 1 ? 's' : ''} affichée${visible > 1 ? 's' : ''} · ${_allSeries.length} au total`;
  document.getElementById('empty').classList.toggle('show', visible === 0 && _allSeries.length > 0);
}

/** Pont pour shared.js (toggleUA appelle applyFilters()) */
function applyFilters() { applySeriesFilters(); }

/**
 * Ouvre la modal de confirmation de scraping pour le mode donné.
 * Charge la date du dernier scraping depuis /api/series/health.

    } else { el.textContent = 'Aucun scraping effectué.'; }

/**
 * Lance le scraping SSE de la liste des séries (GET /api/series/scrape).
 * Affiche les séries au fur et à mesure via renderSeriesCards.
 * À la fin, lance automatiquement le chargement des détails manquants.
 */
function startSeriesScrape() {
  const btn = document.getElementById('btn-run');
  btn.disabled = true; btn.textContent = '⏳ En cours…';
  document.getElementById('prog-zone').classList.add('show');
  document.getElementById('prog-fill').style.width = '0%';
  document.getElementById('prog-lbl').textContent  = 'Scraping des séries…';

  _allSeries = [];
  const source = new EventSource('/api/series/scrape');

  source.onmessage = (e) => {
    const d = JSON.parse(e.data);

    if (d.type === 'progress') {
      const pct = Math.round(d.page / d.total * 100);
      document.getElementById('prog-fill').style.width = pct + '%';
      document.getElementById('prog-lbl').textContent  = `⏳ Page ${d.page}/${d.total}…`;
    }

    if (d.type === 'series' && d.series?.length) {
      // Déduplication côté client pendant le streaming
      const seen = new Set(_allSeries.map(s => `${(s.titre||'').toLowerCase()}|${s.notePresse}`));
      d.series.forEach(s => {
        const key = `${(s.titre||'').toLowerCase()}|${s.notePresse}`;
        if (!seen.has(key)) { seen.add(key); _allSeries.push(s); }
      });
      renderSeriesCards(_allSeries);
      populateGenreFilter(); populateAnneeFilter();
      document.getElementById('filter-bar').classList.add('show');
      document.getElementById('stats').classList.add('show');
    }

    if (d.type === 'done') {
      document.getElementById('prog-fill').style.width = '100%';
      document.getElementById('prog-lbl').textContent  = `✅ ${_allSeries.length} séries récupérées`;
      applySeriesSort(_seriesSortBy);
      saveSeriesCache();
      btn.disabled = false; btn.textContent = '▶ Scraper les séries';
      source.close();
      startSeriesDetailsLoading(); // charge les fiches en arrière-plan
    }
  };

  source.onerror = () => {
    btn.disabled = false; btn.textContent = '▶ Scraper les séries';
    showError('Erreur de connexion pendant le scraping.');
    source.close();
  };
}

/** Re-scrape uniquement les fiches (vide le cache détails + recharge) */

/** Re-scrape tout : liste + fiches */

/**
 * Vide le cache (liste, détails, ou les deux) côté serveur ET localStorage.
 * @param {'list'|'details'|'all'} mode
 */
async function clearSeriesCache(mode = 'details') {
  try {
    if (mode === 'list' || mode === 'all') {
      await fetch('/api/series/clear-list', { method: 'POST' });
      _allSeries = [];
      localStorage.removeItem('vod_series_cache');
      localStorage.removeItem('vod_series_version');
    }
    if (mode === 'details' || mode === 'all') {
      await fetch('/api/series/clear-cache', { method: 'POST' });
      _seriesDet = {};
    }
    saveSeriesCache();
    const msgs = { list: '✅ Cache liste vidé.', details: '✅ Cache détails vidé.', all: '✅ Cache complet vidé.' };
    showError(msgs[mode]);
    if (mode === 'list' || mode === 'all') document.getElementById('cards').innerHTML = '';
  } catch(e) { showError('Erreur lors de la suppression du cache.'); }
}

  const labels = { list: 'la liste', details: 'les détails', all: 'tout le cache' };

  await clearSeriesCache(mode);
}

async function pingServer() {
  const statusEl      = document.getElementById('server-status');
  const scrapeButtons = ['btn-run', 'btn-run-details', 'btn-run-all'].map(id => document.getElementById(id));
  try {
    const [rf, rs] = await Promise.all([
      fetch('/api/health',        { signal: AbortSignal.timeout(3000) }),
      fetch('/api/series/health', { signal: AbortSignal.timeout(3000) }),
    ]);
    if (rf.ok) {
      statusEl.textContent = '🟢';
      statusEl.style.color = 'var(--green)';
      scrapeButtons.forEach(b => b && (b.disabled = false));
      return rs.ok ? await rs.json() : null; // ← données series/health pour la fraîcheur
    } else throw new Error();
  } catch {
    statusEl.textContent = '🔴';
    statusEl.style.color = 'var(--orange)';
    scrapeButtons.forEach(b => b && (b.disabled = true));
    return null;
  }
}

/**
 * Retourne true si le serveur a scrapé séries liste ou détails
 * plus récemment que le cache localStorage.
 */
function isSeriesCacheStale(seriesHealth) {
  if (!seriesHealth) return false;
  const cacheDate = localStorage.getItem(LS_SDATE);
  if (!cacheDate) return false;
  const cached = new Date(cacheDate).getTime();
  const srvList = seriesHealth.lastScrape        ? new Date(seriesHealth.lastScrape).getTime()        : 0;
  const srvDet  = seriesHealth.lastDetailsScrape ? new Date(seriesHealth.lastDetailsScrape).getTime() : 0;
  return srvList > cached || srvDet > cached;
}

  loadPrefs();
  const hadCache     = loadSeriesCache(); // affichage immédiat si données en cache
  const seriesHealth = await pingServer(); // vérifie la disponibilité du serveur
  if (_currentUserId) await loadUserdata(); // charge les notes utilisateur

  if (!hadCache || isSeriesCacheStale(seriesHealth)) {
    if (hadCache) {
      localStorage.removeItem(LS_SERIES);
      localStorage.removeItem(LS_SDET);
      localStorage.removeItem(LS_SDATE);
      console.log('[cache] Séries : données serveur plus récentes — rechargement');
    }
    await loadSeriesFromServer();         // premier chargement ou rechargement
  } else {
    startSeriesDetailsLoading();          // cache frais : complète les détails manquants
  }
})();
</script>
