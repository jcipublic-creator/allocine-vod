<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Films VOD">
<link rel="apple-touch-icon" href="/icon-192.svg">
<link rel="manifest" href="/manifest.json">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<title>🎬 Films VOD</title>
<style>
:root {
  --navy:   #0d2137;
  --blue2:  #1a3550;
  --blue3:  #2a4f70;
  --gold:   #f0c040;
  --text:   #d0e0f0;
  --muted:  #7090a0;
  --green:  #4caf7d;
  --orange: #e08030;
  --st: env(safe-area-inset-top, 0px);
  --sb: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  background: var(--navy); color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
  padding-top: calc(56px + var(--st));
  padding-bottom: calc(8px + var(--sb));
  min-height: 100dvh;
}

/* ── Barre auto-scrape ── */
#auto-scrape-bar { position: fixed; top: 0; left: 0; right: 0; z-index: 999; height: 3px; pointer-events: none; }
#auto-scrape-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--gold), #ffe080); transition: width 2s ease; border-radius: 0 2px 2px 0; box-shadow: 0 0 8px rgba(240,192,64,.7); }

/* ── Header ── */
.header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  height: calc(56px + var(--st)); padding-top: var(--st);
  background: rgba(13,33,55,.97); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--blue3);
  display: flex; align-items: center;
  padding-left: 16px; padding-right: 12px; gap: 10px;
}
.header-title { font-size: 17px; font-weight: 700; color: var(--gold); flex: 1; }
.note-label { font-size: 11px; color: var(--muted); white-space: nowrap; }

/* ── Progress bars ── */
.prog-zone { padding: 8px 14px 4px; display: none; }
.prog-zone.show { display: block; }
.prog-lbl { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
.prog-track { background: var(--blue2); border-radius: 3px; height: 5px; overflow: hidden; }
.prog-fill { height: 100%; border-radius: 3px; width: 0%; transition: width .3s; background: var(--gold); }
.prog-fill.green { background: var(--green); }

/* ── Filter bar ── */
.filter-bar {
  display: none; padding: 8px 12px;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  scrollbar-width: none; gap: 6px;
  border-bottom: 1px solid var(--blue2);
  align-items: center;
}
.filter-bar.show { display: flex; }
.filter-bar::-webkit-scrollbar { display: none; }
.filter-bar select {
  background: var(--blue2); border: 1px solid var(--blue3); color: var(--text);
  padding: 6px 10px; border-radius: 20px; font-size: 13px;
  flex-shrink: 0; -webkit-appearance: none; cursor: pointer;
}
.filter-toggle { flex-shrink: 0; cursor: pointer; }
.filter-toggle input { display: none; }
.filter-toggle span {
  display: inline-block; padding: 6px 10px; border-radius: 20px; font-size: 12px;
  background: var(--blue2); border: 1px solid var(--blue3); color: var(--muted);
  white-space: nowrap; transition: all .15s;
}
.filter-toggle input:checked + span { border-color: var(--gold); color: var(--gold); background: rgba(240,192,64,.08); }

/* Filtres desktop uniquement */
.desktop-only { display: none !important; }

/* ── Stats + export bar ── */
.stats { padding: 6px 14px; font-size: 11px; color: var(--muted); display: none; }
.stats.show { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.export-btns { display: none; gap: 6px; }
.btn-export {
  border: none; border-radius: 16px; padding: 4px 12px; font-size: 11px;
  font-weight: 700; cursor: pointer; white-space: nowrap;
}
.btn-csv  { background: rgba(76,175,125,.2); border: 1px solid rgba(76,175,125,.4); color: #4caf7d; }
.btn-xlsx { background: rgba(33,115,70,.2);  border: 1px solid rgba(33,115,70,.5);  color: #27ae60; }
.btn-csv:hover  { background: rgba(76,175,125,.35); }
.btn-xlsx:hover { background: rgba(33,115,70,.35); }

/* ── Cards ── */
.cards { padding: 6px 10px; display: flex; flex-direction: column; gap: 6px; }

.card {
  background: var(--blue2); border: 1px solid var(--blue3);
  border-radius: 12px; padding: 10px 12px; cursor: pointer;
  transition: border-color .12s;
}
.card:active { border-color: var(--gold); }

.card-top { display: flex; align-items: flex-start; gap: 10px; }
.card-poster { width: 56px; flex-shrink: 0; border-radius: 6px; overflow: hidden; background: var(--blue3); aspect-ratio: 2/3; }
.card-poster img { width: 100%; height: 100%; object-fit: cover; display: block; }
.card-poster-ph { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 20px; background: var(--navy); }
.card-info { flex: 1; min-width: 0; }
.card-title { font-size: 14px; font-weight: 600; color: #fff; line-height: 1.25; }
.card-orig  { font-size: 10px; color: var(--muted); font-style: italic; margin-top: 1px; }
.card-meta  { font-size: 11px; color: var(--muted); margin-top: 2px; }
.card-crew  { font-size: 11px; color: var(--muted); margin-top: 2px; }
.card-crew strong { color: var(--text); font-weight: 600; }
.card-pays  { color: var(--muted); font-weight: 400; }
.card-actors { font-size: 10px; color: var(--muted); margin-top: 1px; font-style: italic; }
.year-pill {
  display: inline-block; font-size: 9px; font-weight: 700;
  background: rgba(240,192,64,.12); color: var(--gold);
  border: 1px solid rgba(240,192,64,.25); border-radius: 4px;
  padding: 1px 4px; margin-left: 4px; vertical-align: middle;
}

.card-scores { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.score-block { text-align: center; }
.score-val { font-size: 17px; font-weight: 700; line-height: 1; }
.score-val.green  { color: var(--green); }
.score-val.orange { color: var(--orange); }
.score-val.muted  { color: var(--muted); font-size: 14px; }
.score-lbl { font-size: 8px; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; }
.score-sep { width: 1px; height: 18px; background: var(--blue3); }

.card-plats { margin-top: 6px; display: flex; flex-wrap: wrap; gap: 4px; }
.pb { font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 500; }
.pb.svod     { background: rgba(76,175,125,.2);  border: 1px solid rgba(76,175,125,.4);  color: #4caf7d; }
.pb.location { background: rgba(240,192,64,.15); border: 1px solid rgba(240,192,64,.35); color: var(--gold); }
.pb.achat    { background: rgba(224,128,48,.15); border: 1px solid rgba(224,128,48,.35); color: var(--orange); }
.pb.vod      { background: rgba(255,255,255,.08);border: 1px solid rgba(255,255,255,.15);color: var(--text); }
.pb-loading  { color: var(--muted); font-size: 11px; font-style: italic; }
.pb-none     { color: var(--muted); font-size: 11px; }

/* Synopsis */
.card-synopsis-wrap {
  margin-top: 7px; padding-top: 7px;
  border-top: 1px solid rgba(42,79,112,.5);
  font-size: 12px; color: var(--text); line-height: 1.5;
}
.card-synopsis-preview { color: var(--text); }
.card-synopsis-rest { display: none; }
.card-synopsis-rest.show { display: inline; }
.card-more-btn { color: var(--gold); font-size: 11px; cursor: pointer; margin-left: 3px; white-space: nowrap; }
.card-synopsis-meta { margin-top: 5px; font-size: 10px; color: var(--muted); display: flex; gap: 10px; flex-wrap: wrap; }

/* Boutons actions utilisateur */
.card-ua { display: flex; gap: 6px; margin-top: 8px; padding-top: 7px; border-top: 1px solid rgba(42,79,112,.5); }
.ua-btn {
  flex: 1; background: none; border: 1px solid var(--blue3); color: var(--muted);
  border-radius: 8px; padding: 5px 4px; font-size: 11px; cursor: pointer;
  text-align: center; transition: all .15s;
}
.ua-btn.active-vu   { border-color: #4caf7d; color: #4caf7d; background: rgba(76,175,125,.12); }
.ua-btn.active-voir { border-color: #3498db; color: #3498db; background: rgba(52,152,219,.12); }
.ua-btn.active-nope { border-color: #e74c3c; color: #e74c3c; background: rgba(231,76,60,.12); }

/* Empty */
.empty { text-align: center; padding: 60px 20px; color: var(--muted); display: none; }
.empty.show { display: block; }

/* ── Modales ── */
#info-modal {
  display: none; position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,.7); align-items: flex-end; justify-content: center;
  padding-bottom: var(--sb);
}
#info-modal.open { display: flex; }
.info-sheet {
  background: #0f2540; border-radius: 18px 18px 0 0;
  padding: 20px 20px calc(20px + var(--sb)); width: 100%;
  max-height: 70vh; overflow-y: auto;
}
.info-sheet h3 { color: var(--gold); font-size: 15px; margin-bottom: 16px; }
.info-row { display: flex; justify-content: space-between; padding: 9px 0;
  border-bottom: 1px solid rgba(42,79,112,.4); gap: 12px; }
.info-row:last-of-type { border-bottom: none; }
.info-row .lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
.info-row .val { font-size: 12px; color: var(--text); text-align: right; }
.info-errors { margin-top: 10px; font-size: 11px; color: #e74c3c; line-height: 1.6; }
.info-close-btn {
  width: 100%; margin-top: 16px; padding: 12px; border-radius: 10px;
  background: var(--blue3); border: none; color: var(--text);
  font-size: 14px; font-weight: 600; cursor: pointer;
}

#confirm-modal {
  display: none; position: fixed; inset: 0; z-index: 600;
  background: rgba(0,0,0,.75); align-items: flex-end; justify-content: center;
  padding-bottom: var(--sb);
}
#confirm-modal.open { display: flex; }
.confirm-sheet {
  background: #0f2540; border-radius: 18px 18px 0 0;
  padding: 24px 20px calc(20px + var(--sb)); width: 100%;
}
.confirm-sheet h3 { color: var(--gold); font-size: 15px; margin-bottom: 10px; }
.confirm-sheet p  { font-size: 13px; color: var(--text); line-height: 1.5; margin-bottom: 6px; }
.confirm-sheet .last-scrape { font-size: 12px; color: var(--muted); margin-bottom: 20px; }
.confirm-btns { display: flex; gap: 10px; }
.confirm-btns button { flex: 1; padding: 13px; border-radius: 10px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; }
.btn-confirm { background: var(--gold); color: #000; }
.btn-cancel  { background: var(--blue3); color: var(--text); }
.confirm-note { display: flex; justify-content: space-between; align-items: center; margin: 14px 0 18px; padding: 12px 14px; background: rgba(255,255,255,.04); border-radius: 10px; border: 1px solid var(--blue3); }
.confirm-note .note-label { font-size: 13px; color: var(--text); }
.note-input {
  width: 52px; background: var(--blue2); border: 1px solid var(--blue3);
  color: var(--text); border-radius: 8px; padding: 5px 6px;
  font-size: 13px; text-align: center;
}

/* Error banner */
#error-banner { margin: 8px 12px; padding: 10px 14px; background: rgba(180,50,50,.25);
  border: 1px solid rgba(200,80,80,.4); border-radius: 10px; font-size: 13px;
  color: #f08080; display: none; }

/* ── Menu hamburger ── */
.menu-btn {
  background: none; border: 1px solid var(--blue3); color: var(--muted);
  border-radius: 8px; width: 32px; height: 32px; font-size: 16px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: color .15s, border-color .15s;
}
.menu-btn:active, .menu-btn.open { color: var(--gold); border-color: var(--gold); }
.menu-dropdown {
  display: none; position: fixed;
  top: calc(56px + var(--st) + 6px); right: 12px;
  background: #0f2540; border: 1px solid var(--blue3);
  border-radius: 12px; z-index: 400; min-width: 200px;
  box-shadow: 0 8px 24px rgba(0,0,0,.5); overflow: hidden;
}
.menu-dropdown.open { display: block; }
.menu-item {
  display: flex; align-items: center; gap: 10px;
  width: 100%; padding: 14px 16px;
  background: none; border: none; border-bottom: 1px solid rgba(42,79,112,.3);
  color: var(--text); font-size: 14px; cursor: pointer; text-align: left;
}
.menu-item:last-child { border-bottom: none; }
.menu-item:active { background: rgba(255,255,255,.06); }
.menu-item:disabled { opacity: .4; cursor: default; }
.menu-separator { height: 1px; background: rgba(42,79,112,.5); }

/* ── Prefs & Profils modales ── */
#prefs-modal, #profiles-modal {
  display: none; position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,.7); align-items: flex-end; justify-content: center;
}
#prefs-modal.open, #profiles-modal.open { display: flex; }
.prefs-sheet {
  background: #0f2540; border-radius: 18px 18px 0 0;
  padding: 20px 20px calc(20px + var(--sb)); width: 100%;
  max-height: 75vh; overflow-y: auto;
}
.prefs-sheet h3 { color: var(--gold); font-size: 15px; margin-bottom: 16px; }
.prefs-section { margin-bottom: 20px; }
.prefs-section-title { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
.pref-row { display: flex; justify-content: space-between; align-items: center; padding: 13px 0; border-bottom: 1px solid rgba(42,79,112,.3); }
.pref-row:last-child { border-bottom: none; }
.pref-label { font-size: 14px; color: var(--text); }
.pref-sub   { font-size: 11px; color: var(--muted); margin-top: 2px; }
/* Toggle switch */
.toggle { position: relative; width: 44px; height: 26px; flex-shrink: 0; }
.toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
.toggle-slider { position: absolute; inset: 0; cursor: pointer; background: var(--blue3); border-radius: 13px; transition: background .2s; }
.toggle-slider::before { content: ''; position: absolute; width: 20px; height: 20px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: transform .2s; }
.toggle input:checked + .toggle-slider { background: var(--gold); }
.toggle input:checked + .toggle-slider::before { transform: translateX(18px); }

/* ── Profils ── */
.profile-row { display: flex; justify-content: space-between; align-items: center; padding: 13px 0; border-bottom: 1px solid rgba(42,79,112,.3); cursor: pointer; }
.profile-row:last-child { border-bottom: none; }
.profile-row.active { cursor: default; }
.profile-name { font-size: 14px; color: var(--text); }
.profile-badge-active { font-size: 11px; color: var(--gold); }
.profile-badge-switch { font-size: 11px; color: var(--muted); }
.add-user-row { display: flex; gap: 8px; align-items: center; margin-top: 16px; }
.add-user-input { flex: 1; background: var(--blue2); border: 1px solid var(--blue3); color: var(--text); border-radius: 8px; padding: 10px 12px; font-size: 14px; }
.add-user-btn { background: var(--gold); color: #000; border: none; border-radius: 8px; padding: 10px 14px; font-size: 14px; font-weight: 700; cursor: pointer; white-space: nowrap; }

/* Profile badge header */
#profile-header-badge {
  display: none; align-items: center; gap: 4px;
  background: rgba(240,192,64,.1); border: 1px solid rgba(240,192,64,.25);
  border-radius: 14px; padding: 4px 10px; font-size: 12px; color: var(--gold);
  cursor: pointer; white-space: nowrap; flex-shrink: 0;
}

/* ── RESPONSIVE DESKTOP ─────────────────────────────────────── */
@media (min-width: 700px) {
  body { padding-top: calc(60px + var(--st)); }

  .header { height: calc(60px + var(--st)); padding-left: 24px; padding-right: 20px; }
  .header-title { font-size: 18px; }

  /* Grille 2 colonnes */
  .cards {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    padding: 10px 20px;
    gap: 10px;
  }

  /* Filtres desktop visibles */
  .desktop-only { display: flex !important; }

  /* Filter bar : wrap au lieu du scroll horizontal */
  .filter-bar {
    overflow-x: visible;
    flex-wrap: wrap;
    padding: 10px 20px;
    gap: 8px;
  }

  /* Export visible */
  .export-btns { display: flex; }

  /* Stats : fond légèrement distinct */
  .stats { padding: 8px 20px; }
  #error-banner { margin: 8px 20px; }

  /* Modales centrées */
  #info-modal, #confirm-modal, #prefs-modal, #profiles-modal {
    align-items: center;
    padding-bottom: 0;
  }
  .info-sheet, .confirm-sheet {
    border-radius: 14px;
    max-width: 480px;
    padding-bottom: 24px;
  }
  .prefs-sheet {
    border-radius: 14px;
    max-width: 480px;
    padding-bottom: 24px;
  }

  /* Progress zones */
  .prog-zone { padding: 8px 20px 4px; }
}

@media (min-width: 1100px) {
  .cards { grid-template-columns: repeat(3, 1fr); padding: 12px 28px; }
  .filter-bar { padding: 10px 28px; }
  .stats { padding: 8px 28px; }
  #error-banner { margin: 8px 28px; }
  .prog-zone { padding: 8px 28px 4px; }
}
</style>
</head>
<body>

<div id="auto-scrape-bar"><div id="auto-scrape-fill"></div></div>

<div id="confirm-modal">
  <div class="confirm-sheet">
    <h3>🔄 Relancer le scraping ?</h3>
    <p>La liste sera mise à jour en arrière-plan.</p>
    <div class="last-scrape" id="confirm-last-scrape"></div>
    <div class="confirm-note">
      <span class="note-label">Note presse minimum</span>
      <input class="note-input" type="number" id="inp-note" value="3.5" min="0" max="5" step="0.1">
    </div>
    <div class="confirm-btns">
      <button class="btn-cancel"  onclick="closeConfirm()">Annuler</button>
      <button class="btn-confirm" onclick="closeConfirm();startScrape()">Confirmer</button>
    </div>
  </div>
</div>

<div id="info-modal" onclick="if(event.target===this)closeInfo()">
  <div class="info-sheet">
    <h3>ℹ Informations</h3>
    <div id="info-content">Chargement…</div>
    <button class="info-close-btn" onclick="closeInfo()">Fermer</button>
  </div>
</div>

<div class="header">
  <div class="header-title">🎬 Films VOD</div>
  <a href="/series.html" style="text-decoration:none;font-size:12px;color:var(--muted);border:1px solid var(--blue3);border-radius:10px;padding:4px 9px;flex-shrink:0;">📺 Séries</a>
  <div id="server-status" style="font-size:11px;color:var(--muted);white-space:nowrap;"></div>
  <div id="profile-header-badge" onclick="openProfiles()">
    👤 <span id="profile-name-badge">—</span>
  </div>
  <button class="menu-btn" id="menu-btn" onclick="toggleMenu(event)">☰</button>
</div>

<div class="menu-dropdown" id="menu-dropdown">
  <button class="menu-item" id="btn-run" onclick="closeMenu();openConfirm()" disabled>▶ Scraper</button>
  <button class="menu-item" onclick="closeMenu();openProfiles()">👤 Profils</button>
  <button class="menu-item" onclick="closeMenu();openPrefs()">🔖 Préférences</button>
  <button class="menu-item" onclick="closeMenu();openInfo()">ℹ Info</button>
  <a class="menu-item" href="/series.html" style="text-decoration:none">📺 Séries</a>
  <div class="menu-separator"></div>
  <button class="menu-item desktop-only" style="font-size:13px" onclick="closeMenu();downloadCSV()">⬇ Exporter CSV</button>
  <button class="menu-item desktop-only" style="font-size:13px" onclick="closeMenu();downloadXLSX()">⬇ Exporter Excel</button>
  <button class="menu-item desktop-only" style="font-size:13px;color:var(--muted)" onclick="closeMenu();testAllocine()">🔍 Tester AlloCiné</button>
  <button class="menu-item" style="font-size:13px;color:var(--muted)" onclick="closeMenu();clearCache()">🗑️ Vider le cache</button>
</div>

<div class="prog-zone" id="prog-zone">
  <div class="prog-lbl" id="prog-lbl">Connexion à AlloCiné…</div>
  <div class="prog-track"><div class="prog-fill" id="prog-fill"></div></div>
</div>

<div id="plat-zone" style="display:none">
  <span id="plat-lbl"></span><span id="plat-count"></span><div id="plat-fill"></div>
</div>

<div id="error-banner"></div>

<div class="filter-bar" id="filter-bar">
  <select id="fil-annee" onchange="applyFilters()">
    <option value="">Toutes les années</option>
    <option value="2026">À partir de 2026</option>
    <option value="2025">À partir de 2025</option>
    <option value="2024">À partir de 2024</option>
    <option value="2023">À partir de 2023</option>
  </select>
  <select id="fil-genre" onchange="applyFilters()">
    <option value="">Tous genres</option>
  </select>
  <select id="fil-type" onchange="applyFilters()">
    <option value="">Streaming &amp; VOD</option>
    <option value="svod">Streaming</option>
    <option value="vod">VOD seulement</option>
  </select>
  <select id="fil-pays" onchange="applyFilters()">
    <option value="">Tous pays</option>
  </select>
  <!-- Desktop uniquement -->
  <select class="desktop-only" id="fil-plat" onchange="applyFilters()">
    <option value="">Toutes les plateformes</option>
  </select>
  <select class="desktop-only" id="fil-note" onchange="applyFilters()">
    <option value="0">Toutes les notes</option>
    <option value="4">≥ 4,0</option>
    <option value="3.8">≥ 3,8</option>
    <option value="3.5" selected>≥ 3,5</option>
  </select>
  <label class="filter-toggle"><input type="checkbox" id="fil-only-voir" onchange="applyFilters()"><span>🔖 À voir</span></label>
  <select id="fil-sort" onchange="applySort(this.value)">
    <option value="presse">↓ Note presse</option>
    <option value="spectateurs">↓ Note spectateurs</option>
    <option value="annee">↓ Année</option>
  </select>
</div>

<div class="stats" id="stats">
  <span id="stats-text"></span>
  <div class="export-btns">
    <button class="btn-export btn-csv"  onclick="downloadCSV()">⬇ CSV</button>
    <button class="btn-export btn-xlsx" onclick="downloadXLSX()">⬇ Excel</button>
  </div>
</div>

<div class="cards" id="cards"></div>
<div class="empty" id="empty">Aucun film trouvé avec ces critères.</div>

<div id="profiles-modal" onclick="if(event.target===this)closeProfiles()">
  <div class="prefs-sheet">
    <h3>👤 Profils</h3>
    <div id="profiles-content"><p style="color:var(--muted);font-size:13px;padding:10px 0">Chargement…</p></div>
    <button class="info-close-btn" style="margin-top:20px" onclick="closeProfiles()">Fermer</button>
  </div>
</div>

<div id="prefs-modal" onclick="if(event.target===this)closePrefs()">
  <div class="prefs-sheet">
    <h3>🔖 Mes préférences</h3>
    <div id="prefs-content"></div>
    <button class="info-close-btn" onclick="closePrefs()">Fermer</button>
  </div>
</div>

<script src="/shared.js"></script>
<script>
// ─── Objet UI ─────────────────────────────────────────────────────────────────
const UI = {
  renderFilms(films) { renderCards(films); },
  reapplyAfterSort(films) {
    films.forEach((film, i) => {
      const det = _details[filmKey(film)];
      if (!det) return;
      const platEl = document.getElementById(`card-plat-${i}`);
      if (platEl) platEl.innerHTML = renderPlatBadges(det.providers || []);
      updateCardMeta(i, det);
    });
  },
  renderUserActions(film, idx) {
    const el = document.getElementById(`ua-${idx}`);
    if (!el) return;
    const id = film.allocineId;
    if (!id) { el.innerHTML = ''; return; }
    const ud = _userdata[id] || {};
    el.outerHTML = `<div class="card-ua" id="ua-${idx}" onclick="event.stopPropagation()">
      <button class="ua-btn ${ud.vu ? 'active-vu' : ''}" onclick="toggleUA('${id}',${idx},'vu')">👁 Vu</button>
      <button class="ua-btn ${ud.vouloir ? 'active-voir' : ''}" onclick="toggleUA('${id}',${idx},'vouloir')">🔖 À voir</button>
      <button class="ua-btn ${ud.nonInteresse ? 'active-nope' : ''}" onclick="toggleUA('${id}',${idx},'nonInteresse')">✕ Non</button>
    </div>`;
  },
  getPlatEl(film) {
    const cur = _allFilms.indexOf(film);
    return cur >= 0 ? document.getElementById(`card-plat-${cur}`) : null;
  },
  onPlatStart() { updatePlatProgress(); },
  onPlatProgress(done, total) {},
  onPlatDone(errors) {
    document.getElementById('server-status').textContent = '🟢';
    this.populateGenreFilter();
    this.populatePlatFilter();
    populatePaysFilter();
  },
  onDetailFetched(idx, data) { updateCardMeta(idx, data); },
  onScrapeStart(btn) {
    btn.disabled = true; btn.textContent = '⏳ En cours…';
    document.getElementById('prog-zone').classList.add('show');
    document.getElementById('plat-zone').classList.remove('show');
    document.getElementById('error-banner').style.display = 'none';
    document.getElementById('prog-fill').style.width = '0%';
    document.getElementById('prog-lbl').textContent = 'Scraping en arrière-plan…';
  },
  onScrapeProgress(pct, annee, count) {
    document.getElementById('prog-fill').style.width = pct + '%';
    document.getElementById('prog-lbl').textContent = `⏳ ${annee || ''} — ${pct}% — ${count} films`;
  },
  onScrapeDone(btn, lastScrape) {
    document.getElementById('prog-fill').style.width = '100%';
    document.getElementById('prog-lbl').textContent = `✅ ${_allFilms.length} films récupérés`;
    document.getElementById('server-status').textContent = '🟢';
    btn.disabled = false; btn.textContent = '▶ Scraper';
    document.getElementById('filter-bar').classList.add('show');
    document.getElementById('stats').classList.add('show');
    document.getElementById('empty').classList.toggle('show', _allFilms.length === 0);
  },
  onScrapeError(btn) {
    btn.disabled = false; btn.textContent = '▶ Scraper';
    document.getElementById('prog-lbl').textContent = '❌ Connexion perdue';
    this.showError('❌ Connexion perdue. Le serveur tourne ?');
  },
  onCacheLoaded(label) {
    document.getElementById('server-status').textContent = '📦';
    this.populateGenreFilter();
    this.populatePlatFilter();
    populatePaysFilter();
    applySort();
    document.getElementById('filter-bar').classList.add('show');
    document.getElementById('stats').classList.add('show');
  },
  onFilmsFromServer(d) {
    document.getElementById('filter-bar').classList.add('show');
    document.getElementById('stats').classList.add('show');
    if (d.lastScrape) {
      const dt = new Date(d.lastScrape);
      const label = dt.toLocaleDateString('fr-FR') + ' ' + dt.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
      document.getElementById('server-status').textContent = `🟢 ${label}`;
      setTimeout(() => { document.getElementById('server-status').textContent = '🟢'; }, 4000);
    }
  },
  populateGenreFilter() {
    const genres = new Set();
    _allFilms.forEach(f => (f.genre||'').split(',').map(g => g.trim()).filter(Boolean).forEach(g => genres.add(g)));
    const sel = document.getElementById('fil-genre');
    const cur = sel.value;
    sel.innerHTML = '<option value="">Tous genres</option>' +
      [...genres].sort().map(g => `<option value="${esc(g.toLowerCase())}"${cur === g.toLowerCase() ? ' selected' : ''}>${esc(g)}</option>`).join('');
    this.applyFilters();
  },
  populatePlatFilter() {
    const sel = document.getElementById('fil-plat');
    if (!sel) return;
    const plats = new Set();
    Object.values(_details).forEach(d =>
      (d.providers || []).forEach(p => { if (!/dvd|blu.ray/i.test(p.name)) plats.add(p.name); })
    );
    const cur = sel.value;
    sel.innerHTML = '<option value="">Toutes les plateformes</option>';
    [...plats].sort().forEach(p =>
      sel.insertAdjacentHTML('beforeend', `<option value="${esc(p)}"${cur===p?' selected':''}>${esc(p)}</option>`)
    );
  },
  updateSortButtons(sortBy) {
    const sel = document.getElementById('fil-sort');
    if (sel) sel.value = sortBy;
  },
  reapplyUserActions() {
    _allFilms.forEach((film, i) => this.renderUserActions(film, i));
  },
  applyFilters() { applyFiltersResponsive(); },
  showError(msg) {
    const el = document.getElementById('error-banner');
    el.textContent = msg; el.style.display = 'block';
    setTimeout(() => { el.style.display = 'none'; }, 8000);
  },
  showAutoScrapeBar(pct, annee) {
    document.getElementById('auto-scrape-fill').style.width = pct + '%';
    document.getElementById('server-status').textContent = `🔄 ${annee || ''} ${pct}%`;
  },
  hideAutoScrapeBar() {
    const fill = document.getElementById('auto-scrape-fill');
    fill.style.width = '100%';
    setTimeout(() => { fill.style.width = '0%'; }, 1000);
    document.getElementById('server-status').textContent = '🟢';
  },
  showUserPicker(users) {
    renderProfiles(users, true);
    document.getElementById('profiles-modal').classList.add('open');
  }
};

// ─── Rendu des cartes ─────────────────────────────────────────────────────────
function renderCards(films) {
  const container = document.getElementById('cards');
  container.innerHTML = films.map((f, i) => {
    const url = f.allocineId
      ? `https://www.allocine.fr/film/fichefilm_gen_cfilm=${f.allocineId}.html`
      : `https://www.allocine.fr/rechercher/?q=${encodeURIComponent(f.titre)}`;
    const annee = f.anneeReelle || f.anneeSortie || '';
    const pScore = f.notePresse;
    const sScore = f.noteSpect;
    const LIMIT = 120;
    const full = f.synopsis || '';
    const short = full.length > LIMIT ? full.slice(0, full.lastIndexOf(' ', LIMIT)) : full;
    const rest = full.length > LIMIT ? full.slice(short.length) : '';
    const posterHtml = f.poster
      ? `<div class="card-poster"><img src="${esc(f.poster)}" alt="" loading="lazy" onerror="posterError(this)"></div>`
      : `<div class="card-poster"><div class="card-poster-ph">🎬</div></div>`;
    return `
<div class="card" id="card-${i}" data-idx="${i}" onclick="openFilm('${url}')">
  <div class="card-top">
    ${posterHtml}
    <div class="card-info">
      <div class="card-title">${esc(f.titre)}${annee ? `<span class="year-pill" id="card-year-${i}">${esc(annee)}</span>` : `<span class="year-pill" id="card-year-${i}" style="display:none"></span>`}</div>
      ${f.titreOriginal ? `<div class="card-orig">${esc(f.titreOriginal)}</div>` : ''}
      <div class="card-meta">${esc((f.genre||'').split(',').map(g=>g.trim()).filter(Boolean).join(', ') || '—')}</div>
      ${f.realisateur ? `<div class="card-crew">De <strong>${esc(f.realisateur)}</strong><span class="card-pays" id="card-pays-${i}"></span></div>` : `<div class="card-crew"><span class="card-pays" id="card-pays-${i}"></span></div>`}
      ${f.acteurs ? `<div class="card-actors">${esc(f.acteurs.split(',').map(a=>a.trim()).filter(Boolean).slice(0,5).join(', '))}</div>` : ''}
    </div>
    <div class="card-scores">
      <div class="score-block">
        <div class="score-val ${pScore >= 4 ? 'green' : 'orange'}">${pScore.toFixed(1)}</div>
        <div class="score-lbl">Presse</div>
      </div>
      <div class="score-sep"></div>
      <div class="score-block">
        ${sScore != null ? `<div class="score-val ${sScore >= 3.5 ? 'green' : 'muted'}">${sScore.toFixed(1)}</div>` : `<div class="score-val muted">—</div>`}
        <div class="score-lbl">Spect.</div>
      </div>
    </div>
  </div>
  ${full ? `<div class="card-synopsis-wrap" onclick="event.stopPropagation()"><span class="card-synopsis-preview">${esc(short)}</span>${rest ? `<span class="card-synopsis-rest" id="syn-rest-${i}">${esc(rest)}</span><span class="card-more-btn" id="syn-btn-${i}" onclick="toggleSynopsis(${i})">… Lire la suite</span>` : ''}<div class="card-synopsis-meta" id="card-meta-${i}"></div></div>` : `<div class="card-synopsis-meta" id="card-meta-${i}" style="margin-top:8px;font-size:11px;color:var(--muted);display:flex;gap:12px;flex-wrap:wrap"></div>`}
  <div class="card-plats" id="card-plat-${i}"><span class="pb-loading">…</span></div>
  <div id="ua-${i}"></div>
</div>`;
  }).join('');
}

function openFilm(url) { window.open(url, '_blank'); }

function toggleSynopsis(i) {
  const btn = document.getElementById(`syn-btn-${i}`);
  const rest = document.getElementById(`syn-rest-${i}`);
  if (!btn || !rest) return;
  const isOpen = rest.classList.contains('show');
  rest.classList.toggle('show', !isOpen);
  btn.textContent = isOpen ? '… Lire la suite' : ' Réduire';
}

function posterError(el) { el.parentNode.innerHTML = '<div class="card-poster-ph">🎬</div>'; }

function updateCardMeta(i, data) {
  const el = document.getElementById(`card-meta-${i}`);
  if (data.pays) {
    const paysEl = document.getElementById(`card-pays-${i}`);
    if (paysEl) paysEl.textContent = ` · ${flagFor(data.pays)}${data.pays}`;
  }
  if (data.annee) {
    const film = _allFilms[i];
    if (film) film.anneeReelle = data.annee;
    const yearEl = document.getElementById(`card-year-${i}`);
    if (yearEl) { yearEl.textContent = data.annee; yearEl.style.display = ''; }
  }
}

// ─── Filtres ──────────────────────────────────────────────────────────────────
function applyFiltersResponsive() {
  const anneeFilter = document.getElementById('fil-annee').value;
  const genreFilter = document.getElementById('fil-genre').value;
  const typeFilter  = document.getElementById('fil-type').value;
  const paysFilter  = document.getElementById('fil-pays').value;
  const onlyVoir    = document.getElementById('fil-only-voir')?.checked;
  // Desktop only (might not be visible but still read)
  const noteMin     = parseFloat(document.getElementById('fil-note')?.value || '0');
  const platFilter  = (document.getElementById('fil-plat')?.value || '').toLowerCase();

  let visible = 0;
  _allFilms.forEach((film, i) => {
    const card = document.getElementById(`card-${i}`);
    if (!card) return;

    const det = _details[filmKey(film)] || {};
    const provObjs = det.providers || [];
    const genres = (film.genre||'').split(',').map(g => g.trim().toLowerCase());
    const filmPays = (det.pays || '').split(',').map(p => p.trim()).filter(Boolean);
    const providers = provObjs.map(p => p.name.toLowerCase());
    const ud = _userdata[film.allocineId] || {};

    const matchAnnee   = !anneeFilter || parseInt(film.anneeReelle || film.anneeSortie) >= parseInt(anneeFilter);
    const matchGenre   = (!genreFilter || genres.some(g => g.includes(genreFilter)))
                      && (_prefs.showDocumentaires || !genres.some(g => g.includes('documentaire')))
                      && (_prefs.showAnimations    || !genres.some(g => g.includes('animation')));
    const matchType    = !typeFilter
                      || (typeFilter === 'svod' && provObjs.some(p => p.type === 'svod'))
                      || (typeFilter === 'vod'  && provObjs.some(p => p.type === 'location' || p.type === 'achat'));
    const matchPays    = !paysFilter  || filmPays.some(p => p === paysFilter);
    const matchNote    = film.notePresse >= noteMin;
    const matchPlat    = !platFilter  || providers.some(p => p.includes(platFilter));
    const matchListe   = (!_prefs.hideVus           || !ud.vu)
                      && (!_prefs.hideNonInteresse  || !ud.nonInteresse)
                      && (!onlyVoir                 || !!ud.vouloir);

    const ok = matchAnnee && matchGenre && matchType && matchPays && matchNote && matchPlat && matchListe;
    card.style.display = ok ? '' : 'none';
    if (ok) visible++;
  });

  const statsText = document.getElementById('stats-text');
  if (statsText) statsText.textContent = `${visible} film${visible > 1 ? 's' : ''} affiché${visible > 1 ? 's' : ''} · ${_allFilms.length} au total`;
  document.getElementById('empty').classList.toggle('show', visible === 0 && _allFilms.length > 0);
}

// ─── Service Worker ───────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(e => console.warn('SW non enregistré :', e.message));
}

// ─── Ping serveur ─────────────────────────────────────────────────────────────
async function pingServer() {
  const statusEl = document.getElementById('server-status');
  const btnEl = document.getElementById('btn-run');
  try {
    const r = await fetch('/api/health', { signal: AbortSignal.timeout(3000) });
    if (r.ok) {
      const d = await r.json();
      statusEl.style.color = 'var(--green)';
      statusEl.textContent = '🟢';
      btnEl.disabled = false;
    } else { throw new Error('non-ok'); }
  } catch {
    statusEl.textContent = '🔴 Hors ligne';
    statusEl.style.color = 'var(--orange)';
    btnEl.disabled = true;
  }
}

// ─── Info ─────────────────────────────────────────────────────────────────────
let _infoData = null;

async function openInfo() {
  document.getElementById('info-modal').classList.add('open');
  try {
    const r = await fetch('/api/health', { signal: AbortSignal.timeout(4000) });
    _infoData = await r.json();
  } catch(e) { _infoData = null; }
  renderInfo();
}
function closeInfo() { document.getElementById('info-modal').classList.remove('open'); }
function renderInfo() {
  const el = document.getElementById('info-content');
  if (!_infoData) { el.textContent = 'Serveur non disponible.'; return; }
  const fmt = iso => iso ? new Date(iso).toLocaleDateString('fr-FR') + ' ' + new Date(iso).toLocaleTimeString('fr-FR', {hour:'2-digit',minute:'2-digit'}) : '—';
  const errors = _infoData.lastScrapeErrors || [];
  el.innerHTML = `
    <div class="info-row"><span class="lbl">Version</span><span class="val">${esc(_infoData.version||'—')}</span></div>
    <div class="info-row"><span class="lbl">Serveur démarré</span><span class="val">${fmt(_infoData.serverStart)}</span></div>
    <div class="info-row"><span class="lbl">Films en base</span><span class="val">${_infoData.cachedFilms ?? '—'} films</span></div>
    <div class="info-row"><span class="lbl">Scraping liste films</span><span class="val">${fmt(_infoData.lastScrape)}</span></div>
    <div class="info-row"><span class="lbl">Scraping plateformes</span><span class="val">${fmt(_infoData.lastDetailsScrape)}</span></div>
    <div class="info-row"><span class="lbl">Erreurs scraping</span><span class="val">${errors.length === 0 ? '✅ Aucune' : `⚠️ ${errors.length}`}</span></div>
    ${errors.length > 0 ? `<div class="info-errors">${errors.map(e => `Page ${e.page} (${e.annee}) : ${esc(e.message)}`).join('<br>')}</div>` : ''}
  `;
}

// ─── Menu ─────────────────────────────────────────────────────────────────────
function toggleMenu(e) {
  e.stopPropagation();
  const dd = document.getElementById('menu-dropdown');
  const btn = document.getElementById('menu-btn');
  const isOpen = dd.classList.toggle('open');
  btn.classList.toggle('open', isOpen);
}
function closeMenu() {
  document.getElementById('menu-dropdown').classList.remove('open');
  document.getElementById('menu-btn').classList.remove('open');
}
document.addEventListener('click', () => closeMenu());

// ─── Profils ──────────────────────────────────────────────────────────────────
async function openProfiles() {
  document.getElementById('profiles-modal').classList.add('open');
  document.getElementById('profiles-content').innerHTML =
    '<p style="color:var(--muted);font-size:13px;padding:10px 0">Chargement…</p>';
  try {
    const list = await loadUsers();
    renderProfiles(list);
  } catch(e) {
    document.getElementById('profiles-content').innerHTML =
      '<p style="color:#e74c3c;font-size:13px;padding:10px 0">Erreur de chargement</p>';
  }
}
function closeProfiles() { document.getElementById('profiles-modal').classList.remove('open'); }

function renderProfiles(list, firstLaunch = false) {
  const intro = firstLaunch
    ? '<p style="font-size:13px;color:var(--text);margin-bottom:16px;line-height:1.5">C\'est ton premier lancement.<br>Choisis ton profil ou crée-en un nouveau.</p>'
    : '';
  const rows = list.map(u => {
    const isActive = u.id === _currentUserId;
    return `<div class="profile-row ${isActive ? 'active' : ''}" ${isActive ? '' : `onclick="selectProfile('${u.id}')"`}>
      <span class="profile-name">${esc(u.name)}</span>
      ${isActive ? '<span class="profile-badge-active">● Actif</span>' : '<span class="profile-badge-switch">Sélectionner →</span>'}
    </div>`;
  }).join('');
  document.getElementById('profiles-content').innerHTML = `
    ${intro}
    <div class="prefs-section">
      <div class="prefs-section-title">Profils disponibles</div>
      ${rows || '<p style="color:var(--muted);font-size:13px;padding:10px 0">Aucun profil</p>'}
    </div>
    <div class="add-user-row">
      <input type="text" id="new-user-name" class="add-user-input"
        placeholder="Nouveau profil…" maxlength="30"
        onkeydown="if(event.key==='Enter')onAddUser()">
      <button class="add-user-btn" onclick="onAddUser()">+ Ajouter</button>
    </div>`;
}

async function selectProfile(userId) {
  switchUser(userId);
  loadPrefs();
  _userdata = {};
  await loadUserdata();
  closeProfiles();
  updateProfileBadge();
}

async function onAddUser() {
  const input = document.getElementById('new-user-name');
  const name = input ? input.value.trim() : '';
  if (!name) { input && input.focus(); return; }
  input.disabled = true;
  try {
    await createUser(name);
    _prefs = { showDocumentaires: false, showAnimations: false, hideVus: true, hideNonInteresse: true };
    savePrefs();
    _userdata = {};
    await loadUserdata();
    closeProfiles();
    updateProfileBadge();
  } catch(e) {
    input.disabled = false;
    input.focus();
  }
}

function updateProfileBadge() {
  if (!_currentUserId) return;
  loadUsers().then(list => {
    const u = list.find(u => u.id === _currentUserId);
    if (!u) return;
    const nameEl = document.getElementById('profile-name-badge');
    const badge  = document.getElementById('profile-header-badge');
    if (nameEl) nameEl.textContent = u.name;
    if (badge) badge.style.display = 'flex';
  }).catch(() => {});
}

// ─── Préférences ──────────────────────────────────────────────────────────────
let _prefs = { showDocumentaires: false, showAnimations: false, hideVus: false, hideNonInteresse: false };

function getPrefsKey() { return 'vod_prefs_' + (_currentUserId || 'anon'); }

function loadPrefs() {
  _prefs = { showDocumentaires: false, showAnimations: false, hideVus: true, hideNonInteresse: true };
  try { Object.assign(_prefs, JSON.parse(localStorage.getItem(getPrefsKey()) || '{}')); } catch(e) {}
  loadServerPrefs().then(serverPrefs => {
    if (!serverPrefs || Object.keys(serverPrefs).length === 0) return;
    Object.assign(_prefs, serverPrefs);
    localStorage.setItem(getPrefsKey(), JSON.stringify(_prefs));
    applyFilters();
  });
}
function savePrefs() {
  localStorage.setItem(getPrefsKey(), JSON.stringify(_prefs));
  saveServerPrefs(_prefs);
}
function setPref(key, val) { _prefs[key] = val; savePrefs(); applyFilters(); }

function openPrefs() { renderPrefs(); document.getElementById('prefs-modal').classList.add('open'); }
function closePrefs() { document.getElementById('prefs-modal').classList.remove('open'); }
function renderPrefs() {
  const row = (key, label) => `
    <div class="pref-row">
      <div class="pref-label">${label}</div>
      <label class="toggle">
        <input type="checkbox" ${_prefs[key] ? 'checked' : ''} onchange="setPref('${key}', this.checked)">
        <span class="toggle-slider"></span>
      </label>
    </div>`;
  document.getElementById('prefs-content').innerHTML = `
    <div class="prefs-section">
      <div class="prefs-section-title">Genres</div>
      ${row('showDocumentaires', 'Afficher les documentaires')}
      ${row('showAnimations',    'Afficher les animations')}
    </div>
    <div class="prefs-section">
      <div class="prefs-section-title">Ma liste</div>
      ${row('hideVus',          'Masquer les films déjà vus')}
      ${row('hideNonInteresse', 'Masquer les "Non intéressé"')}
    </div>`;
}

// ─── Cache ────────────────────────────────────────────────────────────────────
async function clearCache() {
  const btn = document.getElementById('btn-run');
  try {
    const r = await fetch('/api/clear-details-cache', { method: 'POST' });
    const d = await r.json();
    this.showError?.(`✅ Cache vidé — ${d.cleared} entrée(s) supprimées`);
  } catch(e) {}
}

// ─── Tester AlloCiné ─────────────────────────────────────────────────────────
async function testAllocine() {
  const el = document.getElementById('server-status');
  el.textContent = '⏳ Test…';
  try {
    const r = await fetch('/api/ping-allocine');
    const d = await r.json();
    if (d.ok) {
      el.textContent = `✅ AlloCiné OK (${d.status})`;
      setTimeout(() => { el.textContent = '🟢'; }, 5000);
    } else {
      el.textContent = `❌ AlloCiné bloqué`;
      UI.showError(`AlloCiné renvoie une erreur : ${d.status ? 'HTTP ' + d.status : d.message}`);
      setTimeout(() => { el.textContent = '🔴'; }, 8000);
    }
  } catch(e) {
    el.textContent = '❌ Erreur réseau';
    setTimeout(() => { el.textContent = '🔴'; }, 5000);
  }
}

// ─── Export CSV / Excel ───────────────────────────────────────────────────────
function dlBlob(blob, name) {
  const a = document.createElement('a');
  const url = URL.createObjectURL(blob);
  a.href = url; a.download = name;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}
function downloadCSV() {
  const BOM = '\uFEFF';
  const head = ['#','Titre','Titre original','Genre','Réalisateur','Acteurs','Note Presse','Note Spectateurs','Résumé','Plateformes'];
  const rows = _allFilms.map((f, i) => {
    const det = _details[filmKey(f)] || {};
    const plats = (det.providers || []).map(p => p.name).join(', ');
    return [i+1, f.titre, f.titreOriginal||'', f.genre, f.realisateur, f.acteurs,
            f.notePresse.toFixed(1), f.noteSpect != null ? f.noteSpect.toFixed(1) : '', f.synopsis||'', plats];
  });
  const csv = BOM + [head,...rows].map(r => r.map(v => `"${String(v||'').replace(/"/g,'""')}"`).join(';')).join('\n');
  dlBlob(new Blob([csv], { type: 'text/csv;charset=utf-8;' }), 'allocine_vod.csv');
}
function downloadXLSX() {
  if (typeof XLSX === 'undefined') { UI.showError('Bibliothèque Excel non chargée.'); return; }
  const wb = XLSX.utils.book_new();
  const head = [['#','Titre','Titre original','Genre','Réalisateur','Acteurs','Note Presse','Note Spectateurs','Résumé','Plateformes']];
  const rows = _allFilms.map((f, i) => {
    const det = _details[filmKey(f)] || {};
    const plats = (det.providers || []).map(p => p.name).join(', ');
    return [i+1, f.titre, f.titreOriginal||'', f.genre, f.realisateur, f.acteurs,
            f.notePresse, f.noteSpect ?? '', f.synopsis||'', plats];
  });
  const ws = XLSX.utils.aoa_to_sheet([...head, ...rows]);
  ws['!cols'] = [4,34,24,22,20,34,11,14,50,30].map(w => ({ wch: w }));
  XLSX.utils.book_append_sheet(wb, ws, 'Films VOD');
  XLSX.writeFile(wb, 'allocine_vod.xlsx');
}
