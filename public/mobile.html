<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Films VOD">
<link rel="apple-touch-icon" href="/icon-192.svg">
<link rel="manifest" href="/manifest.json">
<title>Films VOD</title>
<style>
:root {
  --navy:   #0d2137;
  --blue2:  #1a3550;
  --blue3:  #2a4f70;
  --gold:   #f0c040;
  --text:   #d0e0f0;
  --muted:  #7090a0;
  --green:  #4caf7d;
  --orange: #e08030;
  --st: env(safe-area-inset-top, 0px);
  --sb: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  background: var(--navy);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
  padding-top: calc(56px + var(--st));
  padding-bottom: calc(8px + var(--sb));
  min-height: 100dvh;
}

/* ── Header ── */
.header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  height: calc(56px + var(--st));
  padding-top: var(--st);
  background: rgba(13,33,55,.97);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--blue3);
  display: flex; align-items: center;
  padding-left: 16px; padding-right: 12px; gap: 10px;
}
.header-title { font-size: 17px; font-weight: 700; color: var(--gold); flex: 1; }
.note-input {
  width: 52px; background: var(--blue2); border: 1px solid var(--blue3);
  color: var(--text); border-radius: 8px; padding: 5px 6px;
  font-size: 13px; text-align: center;
}
.note-label { font-size: 11px; color: var(--muted); white-space: nowrap; }
.btn-scrape {
  background: var(--gold); color: #000; border: none;
  border-radius: 20px; padding: 8px 16px;
  font-size: 14px; font-weight: 700; cursor: pointer;
}
.btn-scrape:disabled { opacity: .5; }

/* ── Progress bars ── */
.prog-zone { padding: 8px 14px 4px; display: none; }
.prog-zone.show { display: block; }
.prog-lbl { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
.prog-track { background: var(--blue2); border-radius: 3px; height: 5px; overflow: hidden; }
.prog-fill { height: 100%; border-radius: 3px; width: 0%; transition: width .3s; background: var(--gold); }
.prog-fill.green { background: var(--green); }

/* ── Filter bar ── */
.filter-bar {
  display: none; padding: 8px 12px;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  scrollbar-width: none; gap: 6px;
  border-bottom: 1px solid var(--blue2);
  align-items: center;
}
.filter-bar.show { display: flex; }
.filter-bar::-webkit-scrollbar { display: none; }
.filter-bar select {
  background: var(--blue2); border: 1px solid var(--blue3); color: var(--text);
  padding: 6px 10px; border-radius: 20px; font-size: 13px;
  flex-shrink: 0; -webkit-appearance: none; cursor: pointer;
}
.filter-toggle { flex-shrink: 0; cursor: pointer; }
.filter-toggle input { display: none; }
.filter-toggle span {
  display: inline-block; padding: 6px 10px; border-radius: 20px; font-size: 12px;
  background: var(--blue2); border: 1px solid var(--blue3); color: var(--muted);
  white-space: nowrap; transition: all .15s;
}
.filter-toggle input:checked + span { border-color: var(--gold); color: var(--gold); background: rgba(240,192,64,.08); }
.sort-group { display: flex; gap: 4px; flex-shrink: 0; }
.sort-btn {
  background: var(--blue2); border: 1px solid var(--blue3); color: var(--muted);
  padding: 6px 10px; border-radius: 20px; font-size: 12px; cursor: pointer;
  white-space: nowrap;
}
.sort-btn.active { border-color: var(--gold); color: var(--gold); }

/* ── Stats ── */
.stats { padding: 6px 14px; font-size: 11px; color: var(--muted); display: none; }
.stats.show { display: block; }

/* ── Cards ── */
.cards { padding: 6px 10px; display: flex; flex-direction: column; gap: 6px; }

.card {
  background: var(--blue2); border: 1px solid var(--blue3);
  border-radius: 12px; padding: 10px 12px; cursor: pointer;
  transition: border-color .12s;
}
.card:active { border-color: var(--gold); }

.card-top { display: flex; align-items: center; gap: 10px; }
.card-info { flex: 1; min-width: 0; }
.card-title { font-size: 14px; font-weight: 600; color: #fff; line-height: 1.25; }
.card-orig  { font-size: 10px; color: var(--muted); font-style: italic; margin-top: 1px; }
.card-meta  { font-size: 11px; color: var(--muted); margin-top: 2px; }
.year-pill {
  display: inline-block; font-size: 9px; font-weight: 700;
  background: rgba(240,192,64,.12); color: var(--gold);
  border: 1px solid rgba(240,192,64,.25); border-radius: 4px;
  padding: 1px 4px; margin-left: 4px; vertical-align: middle;
}

.card-scores { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.score-block { text-align: center; }
.score-val { font-size: 17px; font-weight: 700; line-height: 1; }
.score-val.green  { color: var(--green); }
.score-val.orange { color: var(--orange); }
.score-val.muted  { color: var(--muted); font-size: 14px; }
.score-lbl { font-size: 8px; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; }
.score-sep { width: 1px; height: 18px; background: var(--blue3); }

.card-plats { margin-top: 6px; display: flex; flex-wrap: wrap; gap: 4px; }
.pb { font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 500; }
.pb.svod     { background: rgba(76,175,125,.2);  border: 1px solid rgba(76,175,125,.4);  color: #4caf7d; }
.pb.location { background: rgba(240,192,64,.15); border: 1px solid rgba(240,192,64,.35); color: var(--gold); }
.pb.achat    { background: rgba(224,128,48,.15); border: 1px solid rgba(224,128,48,.35); color: var(--orange); }
.pb.vod      { background: rgba(255,255,255,.08);border: 1px solid rgba(255,255,255,.15);color: var(--text); }
.pb-loading  { color: var(--muted); font-size: 11px; font-style: italic; }
.pb-none     { color: var(--muted); font-size: 11px; }

/* Synopsis */
.card-synopsis-wrap {
  margin-top: 7px; padding-top: 7px;
  border-top: 1px solid rgba(42,79,112,.5);
  font-size: 12px; color: var(--text); line-height: 1.5;
}
.card-synopsis-preview { color: var(--text); }
.card-synopsis-rest { display: none; }
.card-synopsis-rest.show { display: inline; }
.card-more-btn {
  color: var(--gold); font-size: 11px; cursor: pointer;
  margin-left: 3px; white-space: nowrap;
}
.card-synopsis-meta { margin-top: 5px; font-size: 10px; color: var(--muted); display: flex; gap: 10px; flex-wrap: wrap; }

/* Boutons actions utilisateur */
.card-ua { display: flex; gap: 6px; margin-top: 8px; padding-top: 7px; border-top: 1px solid rgba(42,79,112,.5); }
.ua-btn {
  flex: 1; background: none; border: 1px solid var(--blue3); color: var(--muted);
  border-radius: 8px; padding: 5px 4px; font-size: 11px; cursor: pointer;
  text-align: center; transition: all .15s;
}
.ua-btn.active-vu   { border-color: #4caf7d; color: #4caf7d; background: rgba(76,175,125,.12); }
.ua-btn.active-voir { border-color: #3498db; color: #3498db; background: rgba(52,152,219,.12); }
.ua-btn.active-nope { border-color: #e74c3c; color: #e74c3c; background: rgba(231,76,60,.12); }

/* Empty */
.empty { text-align: center; padding: 60px 20px; color: var(--muted); display: none; }
.empty.show { display: block; }

/* Info modal */
#info-modal {
  display: none; position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,.7); align-items: flex-end; justify-content: center;
  padding-bottom: var(--sb);
}
#info-modal.open { display: flex; }
.info-sheet {
  background: #0f2540; border-radius: 18px 18px 0 0;
  padding: 20px 20px calc(20px + var(--sb)); width: 100%;
  max-height: 70vh; overflow-y: auto;
}
.info-sheet h3 { color: var(--gold); font-size: 15px; margin-bottom: 16px; }
.info-row { display: flex; justify-content: space-between; padding: 9px 0;
  border-bottom: 1px solid rgba(42,79,112,.4); gap: 12px; }
.info-row:last-of-type { border-bottom: none; }
.info-row .lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
.info-row .val { font-size: 12px; color: var(--text); text-align: right; }
.info-errors { margin-top: 10px; font-size: 11px; color: #e74c3c; line-height: 1.6; }
.info-close-btn {
  width: 100%; margin-top: 16px; padding: 12px; border-radius: 10px;
  background: var(--blue3); border: none; color: var(--text);
  font-size: 14px; font-weight: 600; cursor: pointer;
}

/* Error banner */
#error-banner { margin: 8px 12px; padding: 10px 14px; background: rgba(180,50,50,.25);
  border: 1px solid rgba(200,80,80,.4); border-radius: 10px; font-size: 13px;
  color: #f08080; display: none; }
</style>
</head>
<body>

<div id="info-modal" onclick="if(event.target===this)closeInfo()">
  <div class="info-sheet">
    <h3>ℹ Informations</h3>
    <div id="info-content">Chargement…</div>
    <button class="info-close-btn" onclick="closeInfo()">Fermer</button>
  </div>
</div>

<div class="header">
  <div class="header-title">🎬 Films VOD</div>
  <div id="server-status" style="font-size:11px;color:var(--muted);white-space:nowrap"></div>
  <button onclick="openInfo()" style="background:none;border:1px solid #2a4f70;color:#7090a0;border-radius:50%;width:26px;height:26px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;">ℹ</button>
  <div style="display:flex;align-items:center;gap:4px" id="note-wrap">
    <span class="note-label">≥</span>
    <input class="note-input" type="number" id="inp-note" value="3.5" min="0" max="5" step="0.1">
  </div>
  <button class="btn-scrape" id="btn-run" onclick="startScrape()" disabled>▶ Scraper</button>
</div>

<div class="prog-zone" id="prog-zone">
  <div class="prog-lbl" id="prog-lbl">Connexion à AlloCiné…</div>
  <div class="prog-track"><div class="prog-fill" id="prog-fill"></div></div>
</div>

<div class="prog-zone" id="plat-zone">
  <div class="prog-lbl" id="plat-lbl">📺 Plateformes… <span id="plat-count" style="color:var(--gold)"></span></div>
  <div class="prog-track"><div class="prog-fill green" id="plat-fill"></div></div>
</div>

<div id="error-banner"></div>

<div class="filter-bar" id="filter-bar">
  <select id="fil-annee" onchange="applyFilters()">
    <option value="">Toutes les années</option>
    <option value="2026">À partir de 2026</option>
    <option value="2025">À partir de 2025</option>
    <option value="2024">À partir de 2024</option>
    <option value="2023">À partir de 2023</option>
  </select>
  <select id="fil-genre" onchange="applyFilters()">
    <option value="">Tous genres</option>
  </select>
  <select id="fil-type" onchange="applyFilters()">
    <option value="">Streaming & VOD</option>
    <option value="svod">Streaming</option>
    <option value="vod">VOD seulement</option>
  </select>
  <select id="fil-pays" onchange="applyFilters()">
    <option value="">Tous pays</option>
  </select>
  <label class="filter-toggle"><input type="checkbox" id="fil-only-voir" onchange="applyFilters()"><span>🔖 À voir</span></label>
  <label class="filter-toggle"><input type="checkbox" id="fil-show-all"  onchange="applyFilters()"><span>Tout afficher</span></label>
  <div class="sort-group">
    <button class="sort-btn active" id="sort-presse"      onclick="applySort('presse')">Presse</button>
    <button class="sort-btn"        id="sort-spectateurs" onclick="applySort('spectateurs')">Spectateurs</button>
    <button class="sort-btn"        id="sort-annee"       onclick="applySort('annee')">Année</button>
  </div>
</div>

<div class="stats" id="stats"></div>
<div class="cards" id="cards"></div>
<div class="empty"  id="empty">Aucun film trouvé avec ces critères.</div>

<script>
// ─── Globals ─────────────────────────────────────────────────────────────────
let _allFilms     = [];
let _details      = {};   // persisté entre scrapes
let _userdata     = {};   // allocineId → { vu, vouloir, nonInteresse }
let _allPlats     = new Set();
let _platsDone    = 0;
let _loadGen      = 0;
let _sortBy       = 'presse';
let _scrapingDone = true;
let _genreDefaultApplied = false;

const sleep  = ms => new Promise(r => setTimeout(r, ms));
const filmKey = f  => `${(f.titre||'').toLowerCase()}|${f.notePresse}`;
const esc    = s   => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

// ─── Scraping ─────────────────────────────────────────────────────────────────
function startScrape() {
  const noteMin = parseFloat(document.getElementById('inp-note').value || '3.5');
  const btn = document.getElementById('btn-run');

  _allFilms = []; _allPlats = new Set(); _platsDone = 0;
  _scrapingDone = false;
  _loadGen++;

  btn.disabled = true; btn.textContent = '⏳';
  document.getElementById('prog-zone').classList.add('show');
  document.getElementById('plat-zone').classList.remove('show');
  document.getElementById('filter-bar').classList.remove('show');
  document.getElementById('stats').classList.remove('show');
  document.getElementById('error-banner').style.display = 'none';
  document.getElementById('prog-fill').style.width = '0%';
  document.getElementById('prog-lbl').textContent = 'Connexion à AlloCiné…';
  document.getElementById('cards').innerHTML = '';
  document.getElementById('empty').classList.remove('show');

  const seen = new Set();
  let platformStarted = false;

  const es = new EventSource(`/api/scrape?annees=2026,2025,2024,2023&noteMin=${noteMin}`);

  es.onmessage = e => {
    const d = JSON.parse(e.data);

    if (d.type === 'films') {
      const pct = Math.round(d.page / d.total * 100);
      document.getElementById('prog-fill').style.width = pct + '%';
      document.getElementById('prog-lbl').textContent =
        `${d.annee || ''} — page ${d.page}/${d.total} — ${_allFilms.length} films`;

      const newFilms = d.films.filter(f => {
        const key = `${f.titre.toLowerCase()}|${f.notePresse}`;
        if (seen.has(key)) return false;
        seen.add(key); return true;
      });

      if (newFilms.length > 0) {
        _allFilms.push(...newFilms);
        populateGenreFilter();
        renderCards(_allFilms);
        applyFilters();
        document.getElementById('filter-bar').classList.add('show');
        document.getElementById('stats').classList.add('show');

        if (!platformStarted) { platformStarted = true; startPlatformLoading(); }
      }
    }

    if (d.type === 'error') showError(`⚠ Page ${d.page} : ${d.message}`);

    if (d.type === 'done') {
      es.close();
      _scrapingDone = true;
      document.getElementById('prog-fill').style.width = '100%';
      document.getElementById('prog-lbl').textContent = `✅ ${_allFilms.length} films`;
      btn.disabled = false; btn.textContent = '▶ Scraper';
      document.getElementById('server-status').textContent = '🟢';
      if (!_allFilms.length) document.getElementById('empty').classList.add('show');
    }
  };

  es.onerror = () => {
    es.close(); _scrapingDone = true;
    btn.disabled = false; btn.textContent = '▶ Scraper';
    showError('❌ Connexion perdue. Le serveur tourne sur le Mac ?');
  };
}

// ─── Platform loading ─────────────────────────────────────────────────────────
async function startPlatformLoading() {
  const gen = _loadGen;
  _platsDone = 0;
  document.getElementById('plat-zone').classList.add('show');
  document.getElementById('plat-fill').style.width = '0%';
  updatePlatProgress();

  let idx = 0;
  while (true) {
    if (_loadGen !== gen) return;

    if (idx < _allFilms.length) {
      const i    = idx++;
      const film = _allFilms[i];
      const key  = filmKey(film);

      if (_details[key]) {
        _platsDone++;
        const el = platEl(film);
        if (el) el.innerHTML = renderPlatBadges(_details[key].providers || []);
        (_details[key].providers || []).forEach(p => _allPlats.add(p.name));
        updatePlatProgress();
        continue;
      }

      await fetchDetails(i, gen);
      if (_loadGen !== gen) return;
      _platsDone++;
      updatePlatProgress();

    } else if (_scrapingDone) {
      break;
    } else {
      await sleep(300);
    }
  }

  if (_loadGen !== gen) return;
  applySort(); // tri final
  saveCache(); // sauvegarde pour consultation hors ligne
  document.getElementById('plat-lbl').innerHTML =
    `📺 Plateformes chargées <span id="plat-count" style="color:var(--gold)">${_allFilms.length}</span>`;
  document.getElementById('plat-fill').style.width = '100%';
  document.getElementById('server-status').textContent = '🟢';
  populateGenreFilter();
  populatePaysFilter();
}

function platEl(film) {
  const cur = _allFilms.indexOf(film);
  return cur >= 0 ? document.getElementById(`card-plat-${cur}`) : null;
}

function updatePlatProgress() {
  const total = _allFilms.length;
  const pct   = total ? Math.round(_platsDone / total * 100) : 0;
  document.getElementById('plat-fill').style.width = pct + '%';
  const el = document.getElementById('plat-count');
  if (el) el.textContent = `${_platsDone} / ${total}`;
}

// ─── Fetch détails ────────────────────────────────────────────────────────────
async function fetchDetails(idx, gen) {
  if (_loadGen !== gen) return;
  const film = _allFilms[idx];
  if (!film) return;
  const key = filmKey(film);
  if (_details[key]) return;

  const getPlatEl = () => platEl(film);

  try {
    const params = new URLSearchParams();
    if (film.allocineId) params.set('allocineId', film.allocineId);
    else params.set('q', film.titre);

    const resp = await fetch(`/api/details?${params}`);
    if (_loadGen !== gen) return;

    if (!resp.ok) {
      _details[key] = { providers: [] };
      const el = getPlatEl(); if (el) el.innerHTML = '<span class="pb-none">—</span>';
      return;
    }

    const data = await resp.json();
    if (_loadGen !== gen) return;

    if (data.error) {
      _details[key] = { providers: [] };
      const el = getPlatEl(); if (el) el.innerHTML = '<span class="pb-none">⚠</span>';
      return;
    }

    _details[key] = data;
    if (data.allocineId && !film.allocineId) film.allocineId = data.allocineId;
    if (data.annee) film.anneeReelle = data.annee;

    const el = getPlatEl(); if (el) el.innerHTML = renderPlatBadges(data.providers || []);
    (data.providers || []).forEach(p => _allPlats.add(p.name));
    if (data.pays) populatePaysFilter();

    // Met à jour le panneau synopsis si ouvert
    const cur = _allFilms.indexOf(film);
    if (cur >= 0) updateCardMeta(cur, data);

  } catch (e) {
    if (_loadGen !== gen) return;
    _details[key] = { providers: [] };
    const el = getPlatEl(); if (el) el.innerHTML = '<span class="pb-none">—</span>';
  }
}

// ─── Rendu des cartes ─────────────────────────────────────────────────────────
function renderCards(films) {
  const container = document.getElementById('cards');
  container.innerHTML = films.map((f, i) => {
    const url    = f.allocineId
      ? `https://www.allocine.fr/film/fichefilm_gen_cfilm=${f.allocineId}.html`
      : `https://www.allocine.fr/rechercher/?q=${encodeURIComponent(f.titre)}`;
    const annee  = f.anneeReelle || f.anneeSortie || '';
    const pScore = f.notePresse;
    const sScore = f.noteSpect;

    return `
<div class="card" id="card-${i}" data-idx="${i}" onclick="openFilm('${url}')">
  <div class="card-top">
    <div class="card-info">
      <div class="card-title">
        ${esc(f.titre)}
        ${annee ? `<span class="year-pill" id="card-year-${i}">${esc(annee)}</span>` : `<span class="year-pill" id="card-year-${i}" style="display:none"></span>`}
      </div>
      ${f.titreOriginal ? `<div class="card-orig">${esc(f.titreOriginal)}</div>` : ''}
      <div class="card-meta">${esc(f.genre || '—')} · ${esc(f.realisateur || '—')}</div>
    </div>
    <div class="card-scores">
      <div class="score-block">
        <div class="score-val ${pScore >= 4 ? 'green' : 'orange'}">${pScore.toFixed(1)}</div>
        <div class="score-lbl">Presse</div>
      </div>
      <div class="score-sep"></div>
      <div class="score-block">
        ${sScore != null
          ? `<div class="score-val ${sScore >= 3.5 ? 'green' : 'muted'}">${sScore.toFixed(1)}</div>`
          : `<div class="score-val muted">—</div>`}
        <div class="score-lbl">Spect.</div>
      </div>
    </div>
  </div>

  <div class="card-plats" id="card-plat-${i}">
    <span class="pb-loading">…</span>
  </div>

  ${renderUserActions(f, i)}

  ${f.synopsis ? (() => {
    const LIMIT = 120;
    const full  = f.synopsis;
    const short = full.length > LIMIT ? full.slice(0, full.lastIndexOf(' ', LIMIT)) : full;
    const rest  = full.length > LIMIT ? full.slice(short.length) : '';
    return `
  <div class="card-synopsis-wrap" onclick="event.stopPropagation()">
    <span class="card-synopsis-preview">${esc(short)}</span>${rest
      ? `<span class="card-synopsis-rest" id="syn-rest-${i}">${esc(rest)}</span
        ><span class="card-more-btn" id="syn-btn-${i}" onclick="toggleSynopsis(${i})">… Lire la suite</span>`
      : ''
    }
    <div class="card-synopsis-meta" id="card-meta-${i}"></div>
  </div>`;
  })() : `
  <div class="card-synopsis-meta" id="card-meta-${i}" style="margin-top:8px;font-size:11px;color:var(--muted);display:flex;gap:12px;flex-wrap:wrap"></div>
  `}
</div>`;
  }).join('');
}

function renderPlatBadges(providers) {
  if (!providers || providers.length === 0) return '<span class="pb-none">—</span>';
  return providers.map(p =>
    `<span class="pb ${esc(p.type)}">${esc(p.name)}</span>`
  ).join('');
}

function openFilm(url) { window.open(url, '_blank'); }

function toggleSynopsis(i) {
  const btn  = document.getElementById(`syn-btn-${i}`);
  const rest = document.getElementById(`syn-rest-${i}`);
  if (!btn || !rest) return;
  const isOpen = rest.classList.contains('show');
  rest.classList.toggle('show', !isOpen);
  btn.textContent = isOpen ? '… Lire la suite' : ' Réduire';
}

function updateCardMeta(i, data) {
  const el = document.getElementById(`card-meta-${i}`);
  if (!el) return;
  const parts = [];
  if (data.pays)  parts.push(`🌍 ${data.pays}`);
  if (data.annee) parts.push(`📅 ${data.annee}`);
  if (parts.length) el.innerHTML = parts.map(p => `<span>${esc(p)}</span>`).join('');

  // Met à jour le badge année dans le titre
  if (data.annee) {
    const film = _allFilms[i];
    if (film) film.anneeReelle = data.annee;
    const yearEl = document.getElementById(`card-year-${i}`);
    if (yearEl) { yearEl.textContent = data.annee; yearEl.style.display = ''; }
  }
}

// ─── Filtres & tri ────────────────────────────────────────────────────────────
function populateGenreFilter() {
  const genres = new Set();
  _allFilms.forEach(f => (f.genre||'').split(',').map(g => g.trim()).filter(Boolean).forEach(g => genres.add(g)));
  const sel = document.getElementById('fil-genre');
  const cur = _genreDefaultApplied ? sel.value : '__excl__';
  if (!_genreDefaultApplied) { _genreDefaultApplied = true; }
  sel.innerHTML = '<option value="">Tous genres</option>' +
    '<option value="__excl__"' + (cur === '__excl__' ? ' selected' : '') + '>Sauf Animation</option>' +
    [...genres].sort().map(g => `<option value="${esc(g.toLowerCase())}"${cur === g.toLowerCase() ? ' selected' : ''}>${esc(g)}</option>`).join('');
  applyFilters();
}

function populatePaysFilter() {
  const paysSet = new Set();
  Object.values(_details).forEach(det => {
    if (!det || !det.pays) return;
    det.pays.split(',').map(p => p.trim()).filter(Boolean).forEach(p => paysSet.add(p));
  });
  const sel = document.getElementById('fil-pays');
  const cur = sel.value;
  sel.innerHTML = '<option value="">Tous pays</option>' +
    [...paysSet].sort((a, b) => a.localeCompare(b, 'fr'))
      .map(p => `<option value="${esc(p)}"${cur === p ? ' selected' : ''}>${esc(p)}</option>`).join('');
}

function applySort(critere) {
  if (critere) _sortBy = critere;
  ['presse','spectateurs','annee'].forEach(c => {
    const btn = document.getElementById(`sort-${c}`);
    if (btn) btn.classList.toggle('active', _sortBy === c);
  });
  _allFilms.sort((a, b) => {
    if (_sortBy === 'annee') {
      const ya = parseInt(a.anneeReelle || a.anneeSortie) || 0;
      const yb = parseInt(b.anneeReelle || b.anneeSortie) || 0;
      return yb - ya || b.notePresse - a.notePresse;
    }
    if (_sortBy === 'spectateurs') {
      if (a.noteSpect == null && b.noteSpect == null) return 0;
      if (a.noteSpect == null) return 1;
      if (b.noteSpect == null) return -1;
      return b.noteSpect - a.noteSpect || b.notePresse - a.notePresse;
    }
    return b.notePresse - a.notePresse || a.titre.localeCompare(b.titre, 'fr');
  });
  renderCards(_allFilms);
  // Réappliquer les badges et méta déjà chargés
  _allFilms.forEach((film, i) => {
    const det = _details[filmKey(film)];
    if (!det) return;
    const platEl = document.getElementById(`card-plat-${i}`);
    if (platEl) platEl.innerHTML = renderPlatBadges(det.providers || []);
    updateCardMeta(i, det);
  });
  applyFilters();
}

function applyFilters() {
  const anneeFilter = document.getElementById('fil-annee').value;
  const genreFilter = document.getElementById('fil-genre').value;
  const typeFilter  = document.getElementById('fil-type').value;
  const paysFilter  = document.getElementById('fil-pays').value;
  const onlyVoir  = document.getElementById('fil-only-voir')?.checked;
  const showAll   = document.getElementById('fil-show-all')?.checked;

  let visible = 0;
  _allFilms.forEach((film, i) => {
    const card = document.getElementById(`card-${i}`);
    if (!card) return;

    const det      = _details[filmKey(film)] || {};
    const provObjs = det.providers || [];
    const genres   = (film.genre||'').split(',').map(g => g.trim().toLowerCase());
    const filmPays = (det.pays || '').split(',').map(p => p.trim()).filter(Boolean);
    const ud       = _userdata[film.allocineId] || {};

    const EXCL_GENRES = ['animation'];
    const matchAnnee = !anneeFilter || parseInt(film.anneeReelle || film.anneeSortie) >= parseInt(anneeFilter);
    const matchGenre = !genreFilter
      || (genreFilter === '__excl__' && !genres.some(g => EXCL_GENRES.some(ex => g.includes(ex))))
      || (genreFilter !== '__excl__' && genres.some(g => g.includes(genreFilter)));
    const matchType  = !typeFilter
      || (typeFilter === 'svod' && provObjs.some(p => p.type === 'svod'))
      || (typeFilter === 'vod'  && provObjs.some(p => p.type === 'location' || p.type === 'achat'));
    const matchPays  = !paysFilter || filmPays.some(p => p === paysFilter);
    const matchListe = (showAll || (!ud.vu && !ud.nonInteresse))
                    && (!onlyVoir || !!ud.vouloir);

    const ok = matchAnnee && matchGenre && matchType && matchPays && matchListe;
    card.style.display = ok ? '' : 'none';
    if (ok) visible++;
  });

  const el = document.getElementById('stats');
  el.textContent = `${visible} film${visible > 1 ? 's' : ''} affiché${visible > 1 ? 's' : ''} · ${_allFilms.length} au total`;
  document.getElementById('empty').classList.toggle('show', visible === 0 && _allFilms.length > 0);
}

// ─── Base de données utilisateur ─────────────────────────────────────────────
async function loadUserdata() {
  try {
    const r = await fetch('/api/userdata');
    _userdata = await r.json();
    reapplyUserActions();
    applyFilters();
  } catch(e) { console.warn('Erreur chargement userdata:', e.message); }
}

async function saveUserdata(id) {
  try {
    await fetch('/api/userdata', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id, ...(_userdata[id] || {}) })
    });
  } catch(e) { console.warn('Erreur sauvegarde userdata:', e.message); }
}

function renderUserActions(film, idx) {
  const id = film.allocineId;
  if (!id) return `<div id="ua-${idx}"></div>`;
  const ud = _userdata[id] || {};
  return `<div class="card-ua" id="ua-${idx}" onclick="event.stopPropagation()">
    <button class="ua-btn ${ud.vu ? 'active-vu' : ''}" onclick="toggleUA('${id}',${idx},'vu')">👁 Vu</button>
    <button class="ua-btn ${ud.vouloir ? 'active-voir' : ''}" onclick="toggleUA('${id}',${idx},'vouloir')">🔖 À voir</button>
    <button class="ua-btn ${ud.nonInteresse ? 'active-nope' : ''}" onclick="toggleUA('${id}',${idx},'nonInteresse')">✕ Non</button>
  </div>`;
}

function toggleUA(id, idx, field) {
  if (!_userdata[id]) _userdata[id] = {};
  _userdata[id][field] = !_userdata[id][field];
  const el = document.getElementById(`ua-${idx}`);
  const film = _allFilms[idx];
  if (el && film) el.outerHTML = renderUserActions(film, idx);
  saveUserdata(id);
}

function reapplyUserActions() {
  _allFilms.forEach((film, i) => {
    const el = document.getElementById(`ua-${i}`);
    if (el) el.outerHTML = renderUserActions(film, i);
  });
}

function showError(msg) {
  const el = document.getElementById('error-banner');
  el.textContent = msg; el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 8000);
}

// ─── Cache localStorage ───────────────────────────────────────────────────────
const LS_FILMS   = 'vod_films';
const LS_DETAILS = 'vod_details';
const LS_DATE    = 'vod_updated';

function saveCache() {
  try {
    localStorage.setItem(LS_FILMS,   JSON.stringify(_allFilms));
    localStorage.setItem(LS_DETAILS, JSON.stringify(_details));
    localStorage.setItem(LS_DATE,    new Date().toISOString());
    console.log('[cache] Sauvegardé :', _allFilms.length, 'films');
  } catch(e) {
    console.warn('[cache] Erreur sauvegarde :', e.message);
  }
}

function loadCache() {
  try {
    const films   = localStorage.getItem(LS_FILMS);
    const details = localStorage.getItem(LS_DETAILS);
    const date    = localStorage.getItem(LS_DATE);
    if (!films) return false;

    _allFilms = JSON.parse(films);
    _details  = details ? JSON.parse(details) : {};

    const d = date ? new Date(date) : null;
    const label = d
      ? `${d.toLocaleDateString('fr-FR')} ${d.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'})}`
      : '—';

    document.getElementById('server-status').textContent = '📦';

    populateGenreFilter();
    populatePaysFilter();
    applySort();
    applyFilters();
    document.getElementById('filter-bar').classList.add('show');
    document.getElementById('stats').classList.add('show');
    return true;
  } catch(e) {
    console.warn('[cache] Erreur chargement :', e.message);
    return false;
  }
}

// ─── Ping serveur au démarrage ────────────────────────────────────────────────
async function pingServer() {
  const statusEl = document.getElementById('server-status');
  const btnEl    = document.getElementById('btn-run');
  try {
    const r = await fetch('/api/health', { signal: AbortSignal.timeout(3000) });
    if (r.ok) {
      const d = await r.json();
      statusEl.style.color = 'var(--green)';
      statusEl.textContent = '🟢';
      btnEl.disabled = false;
    } else { throw new Error('non-ok'); }
  } catch {
    statusEl.textContent = '🔴 Hors ligne';
    statusEl.style.color = 'var(--orange)';
    btnEl.disabled = true;
  }
}

// ─── Service Worker (cache offline de l'app shell) ───────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(e =>
    console.warn('SW non enregistré :', e.message)
  );
}

// ─── Panneau info ─────────────────────────────────────────────────────────────
let _infoData = null;

async function openInfo() {
  document.getElementById('info-modal').classList.add('open');
  try {
    const r = await fetch('/api/health', { signal: AbortSignal.timeout(4000) });
    _infoData = await r.json();
  } catch(e) { _infoData = null; }
  renderInfo();
}

function closeInfo() {
  document.getElementById('info-modal').classList.remove('open');
}

function renderInfo() {
  const el = document.getElementById('info-content');
  if (!_infoData) { el.textContent = 'Serveur non disponible.'; return; }
  const fmt = iso => iso ? new Date(iso).toLocaleDateString('fr-FR') + ' ' + new Date(iso).toLocaleTimeString('fr-FR', {hour:'2-digit',minute:'2-digit'}) : '—';
  const errors = _infoData.lastScrapeErrors || [];
  el.innerHTML = `
    <div class="info-row"><span class="lbl">Version</span><span class="val">${esc(_infoData.version||'—')}</span></div>
    <div class="info-row"><span class="lbl">Serveur démarré</span><span class="val">${fmt(_infoData.serverStart)}</span></div>
    <div class="info-row"><span class="lbl">Dernier scraping</span><span class="val">${fmt(_infoData.lastScrape)}</span></div>
    <div class="info-row"><span class="lbl">Films en cache</span><span class="val">${_infoData.cachedDetails} fiches</span></div>
    <div class="info-row"><span class="lbl">Erreurs scraping</span><span class="val">${errors.length === 0 ? '✅ Aucune' : `⚠️ ${errors.length}`}</span></div>
    ${errors.length > 0 ? `<div class="info-errors">${errors.map(e => `Page ${e.page} (${e.annee}) : ${esc(e.message)}`).join('<br>')}</div>` : ''}
  `;
}

// ─── Init ─────────────────────────────────────────────────────────────────────
(async () => {
  loadCache();        // affiche les données du cache immédiatement
  await pingServer(); // vérifie si le serveur est dispo
  await loadUserdata(); // charge les notes utilisateur depuis le serveur
})();
</script>
